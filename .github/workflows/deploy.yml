name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 指定触发部署的分支

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          node -v
          npm -v
          df -h .
          npm run docs:build 2>&1 | tee /tmp/vitepress-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 120 /tmp/vitepress-build.log
            message=$(tail -n 30 /tmp/vitepress-build.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=VitePress build failed::$message"
            exit "$status"
          fi
          du -sh .vitepress/dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist  # 构建后的静态文件目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
