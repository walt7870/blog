<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">数据库选型流程</title>
  <desc id="desc">从业务事实、一致性、访问模式、数据形态和分析需求判断数据库类型的流程图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .node { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .primary { fill: #e0f2fe; stroke: #0369a1; }
      .choice { fill: #ecfdf5; stroke: #047857; }
      .result { fill: #fff7ed; stroke: #c2410c; }
      .text { fill: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; }
      .small { fill: #334155; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .line { stroke: #4b5563; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .label { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
    </style>
  </defs>
  <rect class="bg" width="960" height="460"/>

  <rect class="node primary" x="360" y="24" width="240" height="58"/>
  <text class="text" x="480" y="49" text-anchor="middle">先确定权威数据</text>
  <text class="small" x="480" y="68" text-anchor="middle">谁负责最终一致的业务事实</text>

  <rect class="node choice" x="90" y="130" width="220" height="72"/>
  <text class="text" x="200" y="158" text-anchor="middle">需要强事务和约束</text>
  <text class="small" x="200" y="180" text-anchor="middle">订单、账户、库存、支付</text>

  <rect class="node choice" x="370" y="130" width="220" height="72"/>
  <text class="text" x="480" y="158" text-anchor="middle">主要降低读取延迟</text>
  <text class="small" x="480" y="180" text-anchor="middle">热点查询、计数、会话状态</text>

  <rect class="node choice" x="650" y="130" width="220" height="72"/>
  <text class="text" x="760" y="158" text-anchor="middle">主要做检索或关系分析</text>
  <text class="small" x="760" y="180" text-anchor="middle">搜索、路径、图谱、日志</text>

  <rect class="node result" x="75" y="265" width="250" height="78"/>
  <text class="text" x="200" y="294" text-anchor="middle">MySQL / PostgreSQL</text>
  <text class="small" x="200" y="317" text-anchor="middle">主存储、事务、备份恢复</text>

  <rect class="node result" x="355" y="265" width="250" height="78"/>
  <text class="text" x="480" y="294" text-anchor="middle">Redis</text>
  <text class="small" x="480" y="317" text-anchor="middle">缓存、临时状态、可重建数据</text>

  <rect class="node result" x="635" y="250" width="250" height="52"/>
  <text class="text" x="760" y="281" text-anchor="middle">Elasticsearch / 图数据库</text>

  <rect class="node result" x="635" y="330" width="250" height="52"/>
  <text class="text" x="760" y="361" text-anchor="middle">InfluxDB / 大数据链路</text>

  <path class="line" d="M 438 82 C 335 95 265 105 213 130"/>
  <path class="line" d="M 480 82 L 480 130"/>
  <path class="line" d="M 522 82 C 625 95 695 105 747 130"/>

  <path class="line" d="M 200 202 L 200 265"/>
  <path class="line" d="M 480 202 L 480 265"/>
  <path class="line" d="M 760 202 L 760 250"/>
  <path class="line" d="M 805 202 C 885 235 900 290 835 330"/>

  <text class="label" x="160" y="236" text-anchor="middle">权威写入</text>
  <text class="label" x="441" y="236" text-anchor="middle">旁路加速</text>
  <text class="label" x="718" y="231" text-anchor="middle">搜索 / 关系</text>
  <text class="label" x="888" y="281" text-anchor="middle">时序 / 分析</text>

  <rect class="node" x="120" y="392" width="720" height="42"/>
  <text class="small" x="480" y="418" text-anchor="middle">原则：主库保存业务事实，缓存、搜索、图、时序和大数据系统通过同步链路提供专用能力。</text>
</svg>
