<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Spring AOP 代理创建流程</title><desc id="desc">Bean 初始化后匹配 Advisor，由 ProxyFactory 创建代理并在调用时执行拦截器链</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#7c3aed"/></marker><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:11}.main{fill:#f5f3ff;stroke:#7c3aed}.yes{fill:#ecfdf5;stroke:#059669}.no{fill:#f8fafc;stroke:#64748b}.t{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.n{font-size:15px;font-weight:700}.s{font-size:12px;fill:#475569}.line{stroke:#7c3aed;stroke-width:2.3;fill:none;marker-end:url(#a)}.dash{stroke:#64748b;stroke-width:1.8;stroke-dasharray:6 5;fill:none;marker-end:url(#a)}</style></defs>
  <rect class="bg" width="1200" height="460"/><text class="t h" x="600" y="40" text-anchor="middle">代理不是注解直接生成的，而是 Bean 后处理阶段的结果</text>
  <path class="line" d="M205 170H250"/><path class="line" d="M430 170H475"/><path class="line" d="M655 170H700"/><path class="line" d="M880 170H925"/>
  <g class="t"><rect class="box" x="45" y="120" width="160" height="100"/><text class="n" x="125" y="158" text-anchor="middle">目标 Bean</text><text class="s" x="125" y="186" text-anchor="middle">完成普通初始化</text><rect class="box main" x="250" y="120" width="180" height="100"/><text class="n" x="340" y="154" text-anchor="middle">AutoProxyCreator</text><text class="s" x="340" y="180" text-anchor="middle">检查基础设施与缓存</text><rect class="box main" x="475" y="120" width="180" height="100"/><text class="n" x="565" y="154" text-anchor="middle">查找 Advisor</text><text class="s" x="565" y="180" text-anchor="middle">切点匹配类和方法</text><rect class="box main" x="700" y="120" width="180" height="100"/><text class="n" x="790" y="154" text-anchor="middle">ProxyFactory</text><text class="s" x="790" y="180" text-anchor="middle">选择 JDK 或类代理</text><rect class="box yes" x="925" y="120" width="230" height="100"/><text class="n" x="1040" y="154" text-anchor="middle">最终代理 Bean</text><text class="s" x="1040" y="180" text-anchor="middle">注入调用方并进入单例池</text></g>
  <path class="dash" d="M565 220V300H340"/><rect class="box no" x="240" y="300" width="200" height="85"/><text class="t n" x="340" y="333" text-anchor="middle">没有匹配 Advisor</text><text class="t s" x="340" y="360" text-anchor="middle">原 Bean 直接返回</text>
  <path class="line" d="M1040 220V300H865"/><rect class="box main" x="675" y="300" width="190" height="85"/><text class="t n" x="770" y="333" text-anchor="middle">方法调用</text><text class="t s" x="770" y="360" text-anchor="middle">拦截器链 → 目标方法</text><text class="t s" x="600" y="430" text-anchor="middle">判断事务是否生效时，既要确认生成了代理，也要确认调用从代理外部进入</text>
</svg>
