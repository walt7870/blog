<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Spring Boot 启动源码主链</title>
  <desc id="desc">从 main 方法经过环境准备、上下文创建、refresh、Bean 创建、代理生成和 WebServer 启动，最后进入请求处理的完整链路</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.band{fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.5;rx:14}.band2{fill:#f0fdf4;stroke:#bbf7d0;stroke-width:1.5;rx:14}
      .box{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:10}.boot{stroke:#2563eb}.spring{stroke:#16a34a}.web{stroke:#d97706}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:25px;font-weight:700}.bandTitle{font-size:16px;font-weight:700;fill:#334155}.node{font-size:16px;font-weight:700}.small{font-size:13px;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:6 5;fill:none}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="560"/>
  <text class="text title" x="600" y="42" text-anchor="middle">Spring Boot 从 main 到可处理请求的源码主链</text>
  <rect class="band" x="30" y="70" width="1140" height="180"/>
  <text class="text bandTitle" x="55" y="98">refresh() 之前：准备启动输入</text>
  <path class="line" d="M205 165 L270 165"/><path class="line" d="M445 165 L510 165"/><path class="line" d="M685 165 L750 165"/><path class="line" d="M925 165 L990 165"/>
  <rect class="box boot" x="55" y="120" width="150" height="90"/><text class="text node" x="130" y="157" text-anchor="middle">main()</text><text class="text small" x="130" y="183" text-anchor="middle">静态工程入口</text>
  <rect class="box boot" x="270" y="120" width="175" height="90"/><text class="text node" x="357" y="153" text-anchor="middle">SpringApplication</text><text class="text small" x="357" y="178" text-anchor="middle">run() 编排启动</text>
  <rect class="box boot" x="510" y="120" width="175" height="90"/><text class="text node" x="597" y="153" text-anchor="middle">Environment</text><text class="text small" x="597" y="178" text-anchor="middle">配置源与 Profile</text>
  <rect class="box boot" x="750" y="120" width="175" height="90"/><text class="text node" x="837" y="153" text-anchor="middle">ApplicationContext</text><text class="text small" x="837" y="178" text-anchor="middle">创建容器外壳</text>
  <rect class="box spring" x="990" y="120" width="155" height="90"/><text class="text node" x="1067" y="153" text-anchor="middle">BeanDefinition</text><text class="text small" x="1067" y="178" text-anchor="middle">登记初始定义</text>
  <path class="line" d="M1067 210 C1067 260 1070 300 1070 345"/>
  <rect class="band2" x="30" y="280" width="1140" height="230"/>
  <text class="text bandTitle" x="55" y="308">refresh() 内部与完成之后：展开定义、创建对象、开放服务</text>
  <path class="line" d="M995 390 L920 390"/><path class="line" d="M770 390 L695 390"/><path class="line" d="M545 390 L470 390"/><path class="line" d="M320 390 L245 390"/>
  <rect class="box spring" x="995" y="345" width="150" height="90"/><text class="text node" x="1070" y="378" text-anchor="middle">后处理器</text><text class="text small" x="1070" y="403" text-anchor="middle">解析配置与自动配置</text>
  <rect class="box spring" x="770" y="345" width="150" height="90"/><text class="text node" x="845" y="378" text-anchor="middle">创建 Bean</text><text class="text small" x="845" y="403" text-anchor="middle">实例化、注入、初始化</text>
  <rect class="box spring" x="545" y="345" width="150" height="90"/><text class="text node" x="620" y="378" text-anchor="middle">生成代理</text><text class="text small" x="620" y="403" text-anchor="middle">AOP 与事务增强</text>
  <rect class="box web" x="320" y="345" width="150" height="90"/><text class="text node" x="395" y="378" text-anchor="middle">WebServer</text><text class="text small" x="395" y="403" text-anchor="middle">启动并监听端口</text>
  <rect class="box web" x="55" y="345" width="190" height="90"/><text class="text node" x="150" y="378" text-anchor="middle">DispatcherServlet</text><text class="text small" x="150" y="403" text-anchor="middle">请求进入 Controller</text>
  <path class="dash" d="M55 468 L1145 468"/>
  <text class="text small" x="600" y="493" text-anchor="middle">排错时先判断问题发生在 refresh 前、refresh 内部，还是请求处理阶段</text>
  <text class="text small" x="600" y="532" text-anchor="middle">蓝色：Boot 启动编排　绿色：Framework 容器机制　橙色：Web 运行链路</text>
</svg>
