<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Spring 学习路径</title>
  <desc id="desc">从 IoC 到 AOP、MVC、Spring Boot 和排错入口的学习路径</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .core{fill:#eff6ff;stroke:#2563eb}
      .ops{fill:#f0fdf4;stroke:#16a34a}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}
      .title{font-size:22px;font-weight:700}
      .body{font-size:15px}
      .small{font-size:13px;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="420"/>
  <rect class="box core" x="40" y="150" width="190" height="120"/>
  <text class="text title" x="135" y="190" text-anchor="middle">IoC</text>
  <text class="text body" x="135" y="220" text-anchor="middle">对象创建</text>
  <text class="text small" x="135" y="245" text-anchor="middle">依赖注入、生命周期</text>

  <rect class="box" x="290" y="70" width="190" height="120"/>
  <text class="text title" x="385" y="110" text-anchor="middle">AOP</text>
  <text class="text body" x="385" y="140" text-anchor="middle">调用增强</text>
  <text class="text small" x="385" y="165" text-anchor="middle">事务、日志、权限</text>

  <rect class="box" x="290" y="230" width="190" height="120"/>
  <text class="text title" x="385" y="270" text-anchor="middle">MVC</text>
  <text class="text body" x="385" y="300" text-anchor="middle">请求处理</text>
  <text class="text small" x="385" y="325" text-anchor="middle">路由、绑定、响应</text>

  <rect class="box core" x="540" y="150" width="210" height="120"/>
  <text class="text title" x="645" y="190" text-anchor="middle">Spring Boot</text>
  <text class="text body" x="645" y="220" text-anchor="middle">应用启动与默认配置</text>
  <text class="text small" x="645" y="245" text-anchor="middle">Starter、自动配置、Actuator</text>

  <rect class="box ops" x="810" y="150" width="190" height="120"/>
  <text class="text title" x="905" y="190" text-anchor="middle">排错入口</text>
  <text class="text body" x="905" y="220" text-anchor="middle">Bean、代理、请求链</text>
  <text class="text small" x="905" y="245" text-anchor="middle">日志、Actuator、依赖树</text>

  <path class="line" d="M230 205 C250 160 265 130 290 130"/>
  <path class="line" d="M230 215 C250 260 265 290 290 290"/>
  <path class="line" d="M480 130 C515 145 515 190 540 190"/>
  <path class="line" d="M480 290 C515 275 515 230 540 230"/>
  <path class="line" d="M750 210 L810 210"/>
</svg>
