<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Spring 启动链与请求链</title>
  <desc id="desc">启动阶段形成可复用对象图，请求阶段沿对象图完成一次 HTTP 调用</desc>
  <defs>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#2563eb"/></marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#059669"/></marker>
    <style>.bg{fill:#f8fafc}.lane{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:16}.box{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.run{fill:#ecfdf5;stroke:#059669}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.laneTitle{font-size:17px;font-weight:700}.node{font-size:15px;font-weight:700}.small{font-size:12px;fill:#475569}.blue{stroke:#2563eb;stroke-width:2.3;fill:none;marker-end:url(#blueArrow)}.green{stroke:#059669;stroke-width:2.3;fill:none;marker-end:url(#greenArrow)}.join{stroke:#64748b;stroke-width:1.5;stroke-dasharray:6 5}</style>
  </defs>
  <rect class="bg" width="1200" height="500"/><text class="text h" x="600" y="38" text-anchor="middle">启动先形成对象图，请求再沿对象图执行</text>
  <rect class="lane" x="30" y="65" width="1140" height="165"/><text class="text laneTitle" x="55" y="96">启动阶段 · 只在应用启动和刷新时执行</text>
  <path class="blue" d="M205 155H250"/><path class="blue" d="M410 155H455"/><path class="blue" d="M615 155H660"/><path class="blue" d="M820 155H865"/><path class="blue" d="M1025 155H1070"/>
  <g class="text"><rect class="box" x="55" y="115" width="150" height="80"/><text class="node" x="130" y="148" text-anchor="middle">Environment</text><text class="small" x="130" y="174" text-anchor="middle">配置与 Profile</text><rect class="box" x="250" y="115" width="160" height="80"/><text class="node" x="330" y="148" text-anchor="middle">ApplicationContext</text><text class="small" x="330" y="174" text-anchor="middle">创建容器外壳</text><rect class="box" x="455" y="115" width="160" height="80"/><text class="node" x="535" y="148" text-anchor="middle">BeanDefinition</text><text class="small" x="535" y="174" text-anchor="middle">登记对象说明书</text><rect class="box" x="660" y="115" width="160" height="80"/><text class="node" x="740" y="148" text-anchor="middle">Bean 与代理</text><text class="small" x="740" y="174" text-anchor="middle">完成装配与增强</text><rect class="box" x="865" y="115" width="160" height="80"/><text class="node" x="945" y="148" text-anchor="middle">WebServer</text><text class="small" x="945" y="174" text-anchor="middle">监听端口</text><rect class="box" x="1070" y="115" width="75" height="80"/><text class="node" x="1108" y="148" text-anchor="middle">就绪</text><text class="small" x="1108" y="174" text-anchor="middle">接流量</text></g>
  <path class="join" d="M740 195V285"/><text class="text small" x="752" y="261">复用已装配对象</text>
  <rect class="lane" x="30" y="270" width="1140" height="175"/><text class="text laneTitle" x="55" y="302">请求阶段 · 每次 HTTP 请求执行一次</text>
  <path class="green" d="M190 370H230"/><path class="green" d="M390 370H430"/><path class="green" d="M590 370H630"/><path class="green" d="M790 370H830"/><path class="green" d="M990 370H1030"/>
  <g class="text"><rect class="box run" x="55" y="330" width="135" height="80"/><text class="node" x="123" y="363" text-anchor="middle">HTTP 请求</text><text class="small" x="123" y="389" text-anchor="middle">路径、参数、Body</text><rect class="box run" x="230" y="330" width="160" height="80"/><text class="node" x="310" y="363" text-anchor="middle">DispatcherServlet</text><text class="small" x="310" y="389" text-anchor="middle">映射与参数解析</text><rect class="box run" x="430" y="330" width="160" height="80"/><text class="node" x="510" y="363" text-anchor="middle">Controller</text><text class="small" x="510" y="389" text-anchor="middle">协议转业务命令</text><rect class="box run" x="630" y="330" width="160" height="80"/><text class="node" x="710" y="363" text-anchor="middle">Service 代理</text><text class="small" x="710" y="389" text-anchor="middle">事务与业务方法</text><rect class="box run" x="830" y="330" width="160" height="80"/><text class="node" x="910" y="363" text-anchor="middle">Repository</text><text class="small" x="910" y="389" text-anchor="middle">访问数据</text><rect class="box run" x="1030" y="330" width="115" height="80"/><text class="node" x="1088" y="363" text-anchor="middle">JSON</text><text class="small" x="1088" y="389" text-anchor="middle">写回响应</text></g>
  <text class="text small" x="600" y="478" text-anchor="middle">启动失败先查对象图形成；请求失败再按 MVC、代理、业务与响应转换逐层定位</text>
</svg>
