<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">DispatcherServlet 内部分派流程</title><desc id="desc">请求从处理器映射经过适配器、参数解析、控制器调用、返回值处理，并在异常时进入异常解析器</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#2563eb"/></marker><marker id="r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#dc2626"/></marker><style>.bg{fill:#f8fafc}.band{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:16}.box{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.work{fill:#ecfdf5;stroke:#059669}.err{fill:#fef2f2;stroke:#dc2626}.t{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.n{font-size:14px;font-weight:700}.s{font-size:12px;fill:#475569}.line{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#a)}.red{stroke:#dc2626;stroke-width:2;stroke-dasharray:6 5;fill:none;marker-end:url(#r)}</style></defs>
  <rect class="bg" width="1200" height="560"/><text class="t h" x="600" y="38" text-anchor="middle">DispatcherServlet 把一次请求拆成可替换的处理策略</text><rect class="band" x="30" y="65" width="1140" height="420"/>
  <path class="line" d="M190 155H230"/><path class="line" d="M390 155H430"/><path class="line" d="M590 155H630"/><path class="line" d="M790 155H830"/><path class="line" d="M990 155H1030"/>
  <g class="t"><rect class="box" x="50" y="110" width="140" height="90"/><text class="n" x="120" y="145" text-anchor="middle">doDispatch()</text><text class="s" x="120" y="172" text-anchor="middle">统一调度入口</text><rect class="box" x="230" y="110" width="160" height="90"/><text class="n" x="310" y="145" text-anchor="middle">HandlerMapping</text><text class="s" x="310" y="172" text-anchor="middle">选择最佳 Handler</text><rect class="box" x="430" y="110" width="160" height="90"/><text class="n" x="510" y="145" text-anchor="middle">ExecutionChain</text><text class="s" x="510" y="172" text-anchor="middle">方法与拦截器</text><rect class="box" x="630" y="110" width="160" height="90"/><text class="n" x="710" y="145" text-anchor="middle">HandlerAdapter</text><text class="s" x="710" y="172" text-anchor="middle">决定怎样调用</text><rect class="box work" x="830" y="110" width="160" height="90"/><text class="n" x="910" y="145" text-anchor="middle">参数解析器</text><text class="s" x="910" y="172" text-anchor="middle">路径、Header、Body</text><rect class="box work" x="1030" y="110" width="120" height="90"/><text class="n" x="1090" y="145" text-anchor="middle">Controller</text><text class="s" x="1090" y="172" text-anchor="middle">调用方法</text></g>
  <path class="line" d="M1090 200V295H965"/><path class="line" d="M805 340H760"/><path class="line" d="M600 340H555"/><path class="line" d="M395 340H350"/>
  <g class="t"><rect class="box work" x="805" y="295" width="160" height="90"/><text class="n" x="885" y="330" text-anchor="middle">返回值处理器</text><text class="s" x="885" y="357" text-anchor="middle">选择响应语义</text><rect class="box work" x="600" y="295" width="160" height="90"/><text class="n" x="680" y="330" text-anchor="middle">内容协商</text><text class="s" x="680" y="357" text-anchor="middle">确定媒体类型</text><rect class="box work" x="395" y="295" width="160" height="90"/><text class="n" x="475" y="330" text-anchor="middle">MessageConverter</text><text class="s" x="475" y="357" text-anchor="middle">对象序列化为 JSON</text><rect class="box work" x="190" y="295" width="160" height="90"/><text class="n" x="270" y="330" text-anchor="middle">HTTP 响应</text><text class="s" x="270" y="357" text-anchor="middle">状态码、Header、Body</text></g>
  <path class="red" d="M910 200V445H700"/><path class="red" d="M1090 200V430H860"/><path class="red" d="M475 385V445H700"/><rect class="box err" x="700" y="410" width="250" height="65"/><text class="t n" x="825" y="437" text-anchor="middle">HandlerExceptionResolver</text><text class="t s" x="825" y="459" text-anchor="middle">绑定、业务、写出异常统一转换</text><text class="t s" x="600" y="530" text-anchor="middle">404/405 多发生在映射阶段，400 常在参数阶段，Controller 返回后的 500 还要检查消息转换</text>
</svg>
