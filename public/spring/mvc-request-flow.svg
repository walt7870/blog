<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">Spring MVC 请求处理流程</title>
  <desc id="desc">HTTP 请求经过过滤器、DispatcherServlet、处理器映射、参数绑定、控制器、业务服务、返回值处理和异常处理</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .main{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}
      .error{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:10}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}
      .title{font-size:19px;font-weight:700}
      .body{font-size:13px}
      .small{font-size:12px;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .errline{stroke:#dc2626;stroke-width:2;fill:none;marker-end:url(#arrow);stroke-dasharray:6 6}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="500"/>
  <rect class="box" x="35" y="190" width="125" height="80"/>
  <text class="text title" x="98" y="220" text-anchor="middle">请求</text>
  <text class="text body" x="98" y="246" text-anchor="middle">HTTP</text>

  <rect class="box" x="205" y="190" width="125" height="80"/>
  <text class="text title" x="268" y="220" text-anchor="middle">Filter</text>
  <text class="text body" x="268" y="246" text-anchor="middle">安全、编码</text>

  <rect class="main" x="375" y="180" width="150" height="100"/>
  <text class="text title" x="450" y="215" text-anchor="middle">Dispatcher</text>
  <text class="text title" x="450" y="240" text-anchor="middle">Servlet</text>

  <rect class="box" x="575" y="80" width="150" height="80"/>
  <text class="text title" x="650" y="110" text-anchor="middle">HandlerMapping</text>
  <text class="text body" x="650" y="136" text-anchor="middle">找到控制器方法</text>

  <rect class="box" x="575" y="205" width="150" height="80"/>
  <text class="text title" x="650" y="235" text-anchor="middle">HandlerAdapter</text>
  <text class="text body" x="650" y="261" text-anchor="middle">绑定参数并调用</text>

  <rect class="box" x="785" y="205" width="150" height="80"/>
  <text class="text title" x="860" y="235" text-anchor="middle">Controller</text>
  <text class="text body" x="860" y="261" text-anchor="middle">协议适配</text>

  <rect class="box" x="785" y="330" width="150" height="80"/>
  <text class="text title" x="860" y="360" text-anchor="middle">Service</text>
  <text class="text body" x="860" y="386" text-anchor="middle">业务编排</text>

  <rect class="box" x="575" y="330" width="150" height="80"/>
  <text class="text title" x="650" y="360" text-anchor="middle">返回值处理</text>
  <text class="text body" x="650" y="386" text-anchor="middle">JSON / 视图</text>

  <rect class="error" x="375" y="330" width="150" height="80"/>
  <text class="text title" x="450" y="360" text-anchor="middle">异常处理</text>
  <text class="text body" x="450" y="386" text-anchor="middle">@ControllerAdvice</text>

  <path class="line" d="M160 230 L205 230"/>
  <path class="line" d="M330 230 L375 230"/>
  <path class="line" d="M525 220 C555 180 555 120 575 120"/>
  <path class="line" d="M650 160 C650 180 650 190 650 205"/>
  <path class="line" d="M725 245 L785 245"/>
  <path class="line" d="M860 285 L860 330"/>
  <path class="line" d="M785 370 L725 370"/>
  <path class="line" d="M575 370 L525 370"/>
  <path class="line" d="M450 330 L450 280"/>
  <path class="errline" d="M860 205 C790 130 535 130 485 330"/>
</svg>
