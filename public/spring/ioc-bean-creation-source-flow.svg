<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Spring 单例 Bean 创建源码流程</title><desc id="desc">从 getBean 到单例池，展示实例化、依赖注入、初始化和代理包装</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#0f766e"/></marker><style>.bg{fill:#f8fafc}.band{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:16}.box{fill:#ecfdf5;stroke:#0f766e;stroke-width:2;rx:10}.hook{fill:#eff6ff;stroke:#2563eb}.final{fill:#fff7ed;stroke:#ea580c}.t{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.n{font-size:15px;font-weight:700}.s{font-size:12px;fill:#475569}.line{stroke:#0f766e;stroke-width:2.3;fill:none;marker-end:url(#a)}.dash{stroke:#2563eb;stroke-width:1.8;stroke-dasharray:6 5;fill:none}</style></defs>
  <rect class="bg" width="1200" height="500"/><text class="t h" x="600" y="38" text-anchor="middle">一份 BeanDefinition 怎样变成最终可注入的 Bean</text><rect class="band" x="30" y="65" width="1140" height="370"/>
  <path class="line" d="M190 155H235"/><path class="line" d="M400 155H445"/><path class="line" d="M610 155H655"/><path class="line" d="M820 155H865"/><path class="line" d="M1030 155H1070"/>
  <g class="t"><rect class="box" x="55" y="110" width="135" height="90"/><text class="n" x="123" y="145" text-anchor="middle">getBean()</text><text class="s" x="123" y="172" text-anchor="middle">请求一个组件</text><rect class="box" x="235" y="110" width="165" height="90"/><text class="n" x="318" y="145" text-anchor="middle">doGetBean()</text><text class="s" x="318" y="172" text-anchor="middle">查缓存与作用域</text><rect class="box" x="445" y="110" width="165" height="90"/><text class="n" x="528" y="145" text-anchor="middle">createBean()</text><text class="s" x="528" y="172" text-anchor="middle">合并定义并预处理</text><rect class="box" x="655" y="110" width="165" height="90"/><text class="n" x="738" y="145" text-anchor="middle">实例化</text><text class="s" x="738" y="172" text-anchor="middle">选择并调用构造器</text><rect class="box" x="865" y="110" width="165" height="90"/><text class="n" x="948" y="145" text-anchor="middle">populateBean()</text><text class="s" x="948" y="172" text-anchor="middle">解析并注入依赖</text><rect class="box final" x="1070" y="110" width="75" height="90"/><text class="n" x="1108" y="145" text-anchor="middle">继续</text><text class="s" x="1108" y="172" text-anchor="middle">初始化</text></g>
  <path class="line" d="M1108 200V285H975"/><path class="line" d="M835 330H790"/><path class="line" d="M630 330H585"/><path class="line" d="M425 330H380"/>
  <g class="t"><rect class="box hook" x="835" y="285" width="140" height="90"/><text class="n" x="905" y="320" text-anchor="middle">Aware 回调</text><text class="s" x="905" y="347" text-anchor="middle">获得容器基础设施</text><rect class="box hook" x="630" y="285" width="160" height="90"/><text class="n" x="710" y="320" text-anchor="middle">初始化处理</text><text class="s" x="710" y="347" text-anchor="middle">回调与后处理器</text><rect class="box hook" x="425" y="285" width="160" height="90"/><text class="n" x="505" y="320" text-anchor="middle">代理包装</text><text class="s" x="505" y="347" text-anchor="middle">返回值可能已变更</text><rect class="box final" x="215" y="285" width="165" height="90"/><text class="n" x="298" y="320" text-anchor="middle">addSingleton()</text><text class="s" x="298" y="347" text-anchor="middle">最终 Bean 进入单例池</text></g>
  <path class="dash" d="M948 200V250H505V285"/><text class="t s" x="735" y="243" text-anchor="middle">BeanPostProcessor 在注入、初始化和代理阶段介入</text><text class="t s" x="600" y="414" text-anchor="middle">关键区别：构造器产生原始实例，容器最终暴露的对象可能是处理器返回的代理</text><text class="t s" x="600" y="472" text-anchor="middle">源码入口：AbstractAutowireCapableBeanFactory.doCreateBean()</text>
</svg>
