<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">结构型模式总览</title>
  <desc id="desc">展示结构型模式如何通过组合、包装和统一入口组织对象关系。</desc>
  <defs>
    <style>.bg{fill:#f0fdf4}.title{font:700 30px Arial,'Microsoft YaHei',sans-serif;fill:#14532d}.sub{font:16px Arial,'Microsoft YaHei',sans-serif;fill:#166534}.box{fill:#fff;stroke:#22c55e;stroke-width:2}.name{font:700 18px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#475569}.line{stroke:#16a34a;stroke-width:2;fill:none}.muted{stroke:#94a3b8}</style>
  </defs>
  <rect class="bg" width="1120" height="620" rx="24"/>
  <text class="title" x="56" y="58">结构型模式：把对象关系搭得更稳</text>
  <text class="sub" x="56" y="88">结构型模式重点不在新增业务规则，而在调整接口、层次、包装、访问路径和共享方式。</text>
  <rect class="box" x="80" y="145" width="220" height="115" rx="16"/><text class="name" x="118" y="184">适配器</text><text class="txt" x="112" y="214">接口不兼容时，</text><text class="txt" x="112" y="236">增加转换层。</text>
  <rect class="box" x="450" y="125" width="220" height="115" rx="16"/><text class="name" x="488" y="164">桥接</text><text class="txt" x="482" y="194">抽象与实现分离，</text><text class="txt" x="482" y="216">两个维度独立变化。</text>
  <rect class="box" x="820" y="145" width="220" height="115" rx="16"/><text class="name" x="858" y="184">外观</text><text class="txt" x="852" y="214">复杂子系统外面，</text><text class="txt" x="852" y="236">提供统一入口。</text>
  <rect class="box" x="80" y="365" width="220" height="115" rx="16"/><text class="name" x="118" y="404">装饰器</text><text class="txt" x="112" y="434">包一层加能力，</text><text class="txt" x="112" y="456">不改原对象。</text>
  <rect class="box" x="333" y="365" width="220" height="115" rx="16"/><text class="name" x="371" y="404">代理</text><text class="txt" x="365" y="434">访问前后加控制，</text><text class="txt" x="365" y="456">如权限、缓存、远程。</text>
  <rect class="box" x="586" y="365" width="220" height="115" rx="16"/><text class="name" x="624" y="404">组合</text><text class="txt" x="618" y="434">树形结构中，</text><text class="txt" x="618" y="456">整体和部分一致处理。</text>
  <rect class="box" x="839" y="365" width="220" height="115" rx="16"/><text class="name" x="877" y="404">享元</text><text class="txt" x="871" y="434">共享可复用内部状态，</text><text class="txt" x="871" y="456">减少大量对象开销。</text>
  <path class="line muted" d="M300 202H450M670 182H820M300 422H333M553 422H586M806 422H839"/>
</svg>
