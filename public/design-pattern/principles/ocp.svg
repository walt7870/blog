<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">开闭原则示意图</title>
  <desc id="desc">展示通过接口扩展新实现，而不是修改核心服务。</desc>
  <style>.bg{fill:#f8fafc}.core{fill:#e0f2fe;stroke:#0284c7}.impl{fill:#fff;stroke:#94a3b8}.new{fill:#dcfce7;stroke:#22c55e}.box{stroke-width:2;rx:14}.t{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#111827}.s{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.dash{stroke-dasharray:6 6}</style>
  <rect class="bg" width="960" height="420" rx="20"/>
  <text class="t" x="48" y="52">开闭原则：稳定代码少修改，变化能力靠扩展</text>
  <rect class="box core" x="360" y="92" width="240" height="86" rx="14"/><text class="t" x="410" y="132">PayService</text><text class="s" x="392" y="158">依赖 PayStrategy 抽象</text>
  <line class="line" x1="480" y1="178" x2="480" y2="230"/>
  <rect class="box impl" x="90" y="250" width="190" height="70" rx="14"/><text class="t" x="127" y="292">支付宝策略</text>
  <rect class="box impl" x="385" y="250" width="190" height="70" rx="14"/><text class="t" x="422" y="292">微信策略</text>
  <rect class="box new" x="680" y="250" width="190" height="70" rx="14"/><text class="t" x="717" y="292">银行卡策略</text>
  <line class="line" x1="480" y1="230" x2="185" y2="250"/><line class="line" x1="480" y1="230" x2="480" y2="250"/><line class="line dash" x1="480" y1="230" x2="775" y2="250"/>
  <text class="s" x="96" y="365">新增支付方式时，新增实现类和注册配置，核心服务不反复改分支。</text>
</svg>
