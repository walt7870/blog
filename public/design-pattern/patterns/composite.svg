<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">组合模式结构图</title><desc id="desc">展示树形结构中叶子和组合节点实现相同组件接口。</desc><style>.bg{fill:#f8fafc}.root{fill:#e0f2fe;stroke:#0284c7}.node{fill:#fff;stroke:#94a3b8}.leaf{fill:#dcfce7;stroke:#22c55e}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">组合：整体和部分使用同一接口处理</text><rect class="box root" x="410" y="100" width="220" height="80" rx="14"/><text class="t" x="464" y="148">Component</text><rect class="box node" x="210" y="260" width="200" height="78" rx="14"/><text class="t" x="270" y="307">Folder</text><rect class="box node" x="630" y="260" width="200" height="78" rx="14"/><text class="t" x="690" y="307">Folder</text><rect class="box leaf" x="120" y="390" width="170" height="64" rx="14"/><text class="s" x="175" y="428">File</text><rect class="box leaf" x="330" y="390" width="170" height="64" rx="14"/><text class="s" x="385" y="428">File</text><rect class="box leaf" x="650" y="390" width="170" height="64" rx="14"/><text class="s" x="705" y="428">File</text><line class="line" x1="520" y1="180" x2="310" y2="260"/><line class="line" x1="520" y1="180" x2="730" y2="260"/><line class="line" x1="310" y1="338" x2="205" y2="390"/><line class="line" x1="310" y1="338" x2="415" y2="390"/><line class="line" x1="730" y1="338" x2="735" y2="390"/></svg>
