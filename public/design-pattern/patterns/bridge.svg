<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">桥接模式结构图</title><desc id="desc">展示抽象维度和实现维度分离，二者可以独立扩展。</desc><style>.bg{fill:#f8fafc}.abs{fill:#e0f2fe;stroke:#0284c7}.impl{fill:#dcfce7;stroke:#22c55e}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2;fill:none}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">桥接：拆开两个独立变化维度，避免继承爆炸</text><rect class="box abs" x="130" y="135" width="230" height="88" rx="14"/><text class="t" x="196" y="174">Message</text><text class="s" x="172" y="200">普通消息 / 加急消息</text><rect class="box abs" x="130" y="300" width="230" height="88" rx="14"/><text class="t" x="184" y="340">Notification</text><text class="s" x="170" y="366">业务抽象维度</text><rect class="box impl" x="620" y="135" width="230" height="88" rx="14"/><text class="t" x="682" y="174">Sender</text><text class="s" x="672" y="200">短信 / 邮件 / 站内信</text><rect class="box impl" x="620" y="300" width="230" height="88" rx="14"/><text class="t" x="674" y="340">Implementor</text><text class="s" x="672" y="366">实现维度</text><path class="line" d="M360 179H620"/><polygon class="arrow" points="620,179 607,171 607,187"/><text class="s" x="420" y="230">抽象持有实现接口</text></svg>
