<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">备忘录模式结构图</title><desc id="desc">展示发起人保存状态快照，管理者保存快照并用于恢复。</desc><style>.bg{fill:#f8fafc}.ori{fill:#e0f2fe;stroke:#0284c7}.mem{fill:#dcfce7;stroke:#22c55e}.care{fill:#fff7ed;stroke:#f97316}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">备忘录：在不暴露内部细节的前提下保存和恢复状态</text><rect class="box ori" x="90" y="190" width="220" height="110" rx="14"/><text class="t" x="150" y="232">Originator</text><text class="s" x="138" y="260">createMemento()</text><rect class="box mem" x="420" y="190" width="220" height="110" rx="14"/><text class="t" x="485" y="232">Memento</text><text class="s" x="465" y="260">状态快照</text><rect class="box care" x="750" y="190" width="220" height="110" rx="14"/><text class="t" x="812" y="232">Caretaker</text><text class="s" x="804" y="260">保存快照列表</text><line class="line" x1="310" y1="245" x2="420" y2="245"/><polygon class="arrow" points="420,245 407,237 407,253"/><line class="line" x1="640" y1="245" x2="750" y2="245"/><polygon class="arrow" points="750,245 737,237 737,253"/></svg>
