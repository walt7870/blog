<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">外观模式结构图</title><desc id="desc">展示外观对象为复杂子系统提供统一入口。</desc><style>.bg{fill:#f8fafc}.facade{fill:#e0f2fe;stroke:#0284c7}.sub{fill:#fff;stroke:#94a3b8}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">外观：把复杂子系统收口成稳定入口</text><rect class="box sub" x="90" y="210" width="190" height="76" rx="14"/><text class="t" x="138" y="256">客户端</text><rect class="box facade" x="410" y="190" width="230" height="110" rx="14"/><text class="t" x="466" y="232">OrderFacade</text><text class="s" x="455" y="260">submitOrder()</text><rect class="box sub" x="770" y="90" width="190" height="62" rx="14"/><text class="s" x="825" y="128">库存</text><rect class="box sub" x="770" y="175" width="190" height="62" rx="14"/><text class="s" x="825" y="213">支付</text><rect class="box sub" x="770" y="260" width="190" height="62" rx="14"/><text class="s" x="825" y="298">消息</text><rect class="box sub" x="770" y="345" width="190" height="62" rx="14"/><text class="s" x="825" y="383">积分</text><line class="line" x1="280" y1="248" x2="410" y2="248"/><polygon class="arrow" points="410,248 397,240 397,256"/><line class="line" x1="640" y1="245" x2="770" y2="121"/><line class="line" x1="640" y1="245" x2="770" y2="206"/><line class="line" x1="640" y1="245" x2="770" y2="291"/><line class="line" x1="640" y1="245" x2="770" y2="376"/></svg>
