<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">责任链模式结构图</title><desc id="desc">展示请求沿处理器链依次传递，每个处理器决定处理或继续传递。</desc><style>.bg{fill:#f8fafc}.handler{fill:#e0f2fe;stroke:#0284c7}.box{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">责任链：请求沿链传递，处理器可插拔</text><rect class="box" x="75" y="210" width="160" height="70" rx="14"/><text class="t" x="116" y="253">请求</text><rect class="handler" x="300" y="190" width="180" height="110" rx="14"/><text class="t" x="342" y="232">参数校验</text><text class="s" x="338" y="260">pass / reject</text><rect class="handler" x="540" y="190" width="180" height="110" rx="14"/><text class="t" x="582" y="232">风控校验</text><text class="s" x="578" y="260">pass / reject</text><rect class="handler" x="780" y="190" width="180" height="110" rx="14"/><text class="t" x="822" y="232">库存校验</text><text class="s" x="818" y="260">pass / reject</text><line class="line" x1="235" y1="245" x2="300" y2="245"/><polygon class="arrow" points="300,245 287,237 287,253"/><line class="line" x1="480" y1="245" x2="540" y2="245"/><polygon class="arrow" points="540,245 527,237 527,253"/><line class="line" x1="720" y1="245" x2="780" y2="245"/><polygon class="arrow" points="780,245 767,237 767,253"/></svg>
