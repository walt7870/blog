<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">原型模式结构图</title><desc id="desc">展示通过复制原型对象创建新对象，并区分浅拷贝和深拷贝风险。</desc><style>.bg{fill:#f8fafc}.proto{fill:#e0f2fe;stroke:#0284c7}.copy{fill:#dcfce7;stroke:#22c55e}.warn{fill:#fff7ed;stroke:#f97316}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">原型：从已有样板对象复制出新对象</text><rect class="box proto" x="120" y="170" width="230" height="120" rx="14"/><text class="t" x="178" y="210">Prototype</text><text class="s" x="160" y="238">clone()</text><text class="s" x="160" y="264">包含默认配置和结构</text><line class="line" x1="350" y1="230" x2="520" y2="230"/><polygon class="arrow" points="520,230 507,222 507,238"/><rect class="box copy" x="520" y="130" width="220" height="80" rx="14"/><text class="t" x="584" y="178">Copy A</text><rect class="box copy" x="520" y="250" width="220" height="80" rx="14"/><text class="t" x="584" y="298">Copy B</text><rect class="box warn" x="780" y="190" width="210" height="110" rx="14"/><text class="s" x="815" y="228">关注深浅拷贝</text><text class="s" x="815" y="254">引用字段是否共享</text><text class="s" x="815" y="280">复制后是否独立</text></svg>
