<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">享元模式结构图</title><desc id="desc">展示享元工厂共享内部状态，对外部状态由调用方传入。</desc><style>.bg{fill:#f8fafc}.factory{fill:#e0f2fe;stroke:#0284c7}.shared{fill:#dcfce7;stroke:#22c55e}.ext{fill:#fff7ed;stroke:#f97316}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">享元：共享内部状态，外部状态运行时传入</text><rect class="box factory" x="90" y="190" width="230" height="100" rx="14"/><text class="t" x="150" y="230">FlyweightFactory</text><text class="s" x="150" y="258">按 key 缓存对象</text><rect class="box shared" x="460" y="100" width="230" height="82" rx="14"/><text class="t" x="525" y="148">字体 A</text><rect class="box shared" x="460" y="220" width="230" height="82" rx="14"/><text class="t" x="525" y="268">字体 B</text><rect class="box ext" x="760" y="180" width="220" height="120" rx="14"/><text class="s" x="800" y="220">外部状态：</text><text class="s" x="800" y="248">坐标、颜色、文本</text><text class="s" x="800" y="276">由调用方传入</text><line class="line" x1="320" y1="240" x2="460" y2="141"/><line class="line" x1="320" y1="240" x2="460" y2="261"/><line class="line" x1="690" y1="240" x2="760" y2="240"/><polygon class="arrow" points="760,240 747,232 747,248"/></svg>
