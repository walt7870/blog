<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">迭代器模式结构图</title><desc id="desc">展示客户端通过迭代器顺序访问集合元素，而不暴露集合内部结构。</desc><style>.bg{fill:#f8fafc}.it{fill:#e0f2fe;stroke:#0284c7}.col{fill:#dcfce7;stroke:#22c55e}.box{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">迭代器：统一遍历入口，隐藏集合内部结构</text><rect class="box" x="90" y="210" width="170" height="70" rx="14"/><text class="t" x="132" y="253">客户端</text><rect class="it" x="370" y="190" width="220" height="110" rx="14"/><text class="t" x="432" y="232">Iterator</text><text class="s" x="422" y="260">hasNext() / next()</text><rect class="col" x="720" y="190" width="220" height="110" rx="14"/><text class="t" x="784" y="232">Collection</text><text class="s" x="772" y="260">数组 / 链表 / 树</text><line class="line" x1="260" y1="245" x2="370" y2="245"/><polygon class="arrow" points="370,245 357,237 357,253"/><line class="line" x1="590" y1="245" x2="720" y2="245"/><polygon class="arrow" points="720,245 707,237 707,253"/></svg>
