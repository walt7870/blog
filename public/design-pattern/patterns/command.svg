<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">命令模式结构图</title><desc id="desc">展示请求被封装成命令对象，调用者触发命令，接收者执行实际操作。</desc><style>.bg{fill:#f8fafc}.cmd{fill:#e0f2fe;stroke:#0284c7}.recv{fill:#dcfce7;stroke:#22c55e}.box{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">命令：把请求封装成可排队、记录、撤销的对象</text><rect class="box" x="90" y="205" width="180" height="76" rx="14"/><text class="t" x="136" y="252">Invoker</text><rect class="cmd" x="390" y="180" width="230" height="126" rx="14"/><text class="t" x="460" y="222">Command</text><text class="s" x="448" y="250">execute()</text><text class="s" x="448" y="276">undo()</text><rect class="recv" x="760" y="205" width="190" height="76" rx="14"/><text class="t" x="808" y="252">Receiver</text><line class="line" x1="270" y1="243" x2="390" y2="243"/><polygon class="arrow" points="390,243 377,235 377,251"/><line class="line" x1="620" y1="243" x2="760" y2="243"/><polygon class="arrow" points="760,243 747,235 747,251"/></svg>
