<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">状态模式结构图</title><desc id="desc">展示上下文对象把行为委托给当前状态，状态切换后行为改变。</desc><style>.bg{fill:#f8fafc}.ctx{fill:#e0f2fe;stroke:#0284c7}.state{fill:#dcfce7;stroke:#22c55e}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2;fill:none}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">状态：当前状态决定对象行为，并可切换到下一个状态</text><rect class="box ctx" x="100" y="190" width="230" height="110" rx="14"/><text class="t" x="164" y="232">Order</text><text class="s" x="142" y="260">持有 currentState</text><rect class="box state" x="510" y="80" width="210" height="70" rx="14"/><text class="s" x="570" y="122">待支付</text><rect class="box state" x="510" y="205" width="210" height="70" rx="14"/><text class="s" x="570" y="247">已支付</text><rect class="box state" x="510" y="330" width="210" height="70" rx="14"/><text class="s" x="570" y="372">已发货</text><path class="line" d="M330 245H510"/><polygon class="arrow" points="510,245 497,237 497,253"/><path class="line" d="M720 115Q820 160 720 240"/><path class="line" d="M720 240Q820 285 720 365"/></svg>
