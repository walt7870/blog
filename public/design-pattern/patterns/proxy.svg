<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">代理模式结构图</title><desc id="desc">展示客户端通过代理访问真实对象，代理负责访问控制和增强。</desc><style>.bg{fill:#f8fafc}.proxy{fill:#e0f2fe;stroke:#0284c7}.real{fill:#dcfce7;stroke:#22c55e}.box{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">代理：访问真实对象前后加控制</text><rect class="box" x="100" y="205" width="190" height="76" rx="14"/><text class="t" x="148" y="252">客户端</text><rect class="proxy" x="420" y="180" width="230" height="126" rx="14"/><text class="t" x="482" y="222">Proxy</text><text class="s" x="468" y="250">鉴权 / 缓存 / 远程</text><text class="s" x="468" y="276">延迟加载 / 日志</text><rect class="real" x="780" y="205" width="190" height="76" rx="14"/><text class="t" x="828" y="252">真实对象</text><line class="line" x1="290" y1="243" x2="420" y2="243"/><polygon class="arrow" points="420,243 407,235 407,251"/><line class="line" x1="650" y1="243" x2="780" y2="243"/><polygon class="arrow" points="780,243 767,235 767,251"/></svg>
