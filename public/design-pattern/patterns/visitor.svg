<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">访问者模式结构图</title><desc id="desc">展示稳定对象结构接受访问者，新增操作通过新增访问者实现。</desc><style>.bg{fill:#f8fafc}.elem{fill:#e0f2fe;stroke:#0284c7}.vis{fill:#dcfce7;stroke:#22c55e}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">访问者：结构稳定，操作通过访问者扩展</text><rect class="box elem" x="110" y="120" width="230" height="80" rx="14"/><text class="t" x="172" y="168">Element A</text><rect class="box elem" x="110" y="290" width="230" height="80" rx="14"/><text class="t" x="172" y="338">Element B</text><rect class="box vis" x="580" y="115" width="260" height="90" rx="14"/><text class="t" x="646" y="154">ExportVisitor</text><text class="s" x="628" y="180">visit(A) / visit(B)</text><rect class="box vis" x="580" y="285" width="260" height="90" rx="14"/><text class="t" x="654" y="324">StatsVisitor</text><text class="s" x="628" y="350">visit(A) / visit(B)</text><line class="line" x1="340" y1="160" x2="580" y2="160"/><polygon class="arrow" points="580,160 567,152 567,168"/><line class="line" x1="340" y1="330" x2="580" y2="330"/><polygon class="arrow" points="580,330 567,322 567,338"/></svg>
