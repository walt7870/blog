<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">解释器模式结构图</title><desc id="desc">展示表达式树根据上下文解释执行规则。</desc><style>.bg{fill:#f8fafc}.expr{fill:#e0f2fe;stroke:#0284c7}.term{fill:#dcfce7;stroke:#22c55e}.ctx{fill:#fff7ed;stroke:#f97316}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">解释器：把规则表达式解析成可执行的表达式树</text><rect class="box ctx" x="80" y="190" width="190" height="90" rx="14"/><text class="t" x="132" y="228">Context</text><text class="s" x="116" y="255">变量和输入数据</text><rect class="box expr" x="420" y="90" width="220" height="80" rx="14"/><text class="t" x="482" y="138">Expression</text><rect class="box term" x="260" y="280" width="210" height="76" rx="14"/><text class="s" x="320" y="324">Terminal</text><rect class="box term" x="590" y="280" width="210" height="76" rx="14"/><text class="s" x="640" y="324">NonTerminal</text><line class="line" x1="530" y1="170" x2="365" y2="280"/><line class="line" x1="530" y1="170" x2="695" y2="280"/><line class="line" x1="270" y1="235" x2="420" y2="130"/></svg>
