<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">单例模式结构图</title><desc id="desc">展示多个调用方通过统一访问点获取同一个实例。</desc><style>.bg{fill:#f8fafc}.client{fill:#fff;stroke:#94a3b8}.single{fill:#e0f2fe;stroke:#0284c7}.warn{fill:#fee2e2;stroke:#ef4444}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2;fill:none}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">单例：全局唯一访问点和唯一实例</text><rect class="box client" x="95" y="105" width="180" height="68" rx="14"/><text class="s" x="145" y="146">调用方 A</text><rect class="box client" x="95" y="225" width="180" height="68" rx="14"/><text class="s" x="145" y="266">调用方 B</text><rect class="box client" x="95" y="345" width="180" height="68" rx="14"/><text class="s" x="145" y="386">调用方 C</text><rect class="box single" x="430" y="190" width="260" height="110" rx="14"/><text class="t" x="486" y="230">Singleton</text><text class="s" x="478" y="258">getInstance()</text><text class="s" x="478" y="282">private constructor</text><path class="line" d="M275 139Q360 139 430 220M275 259H430M275 379Q360 379 430 280"/><polygon class="arrow" points="430,220 417,212 417,228"/><rect class="box warn" x="760" y="190" width="220" height="110" rx="14"/><text class="s" x="800" y="228">谨慎保存业务状态</text><text class="s" x="800" y="254">关注并发和测试隔离</text></svg>
