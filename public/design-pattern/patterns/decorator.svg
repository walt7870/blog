<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">装饰器模式结构图</title><desc id="desc">展示多个装饰器围绕同一组件接口逐层增强功能。</desc><style>.bg{fill:#f8fafc}.core{fill:#e0f2fe;stroke:#0284c7}.deco{fill:#fff7ed;stroke:#f97316}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">装饰器：保持接口一致，逐层叠加能力</text><rect class="box deco" x="110" y="190" width="210" height="90" rx="14"/><text class="t" x="162" y="228">缓存装饰器</text><text class="s" x="154" y="255">before / after</text><rect class="box deco" x="400" y="190" width="210" height="90" rx="14"/><text class="t" x="452" y="228">日志装饰器</text><text class="s" x="444" y="255">before / after</text><rect class="box core" x="690" y="190" width="210" height="90" rx="14"/><text class="t" x="750" y="228">真实组件</text><text class="s" x="744" y="255">核心能力</text><line class="line" x1="320" y1="235" x2="400" y2="235"/><polygon class="arrow" points="400,235 387,227 387,243"/><line class="line" x1="610" y1="235" x2="690" y2="235"/><polygon class="arrow" points="690,235 677,227 677,243"/><text class="s" x="120" y="365">调用方看到的始终是同一接口，增强能力通过包装链组合。</text></svg>
