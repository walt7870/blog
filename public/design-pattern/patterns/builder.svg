<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">建造者模式结构图</title><desc id="desc">展示复杂对象由建造者分步骤组装，最终生成产品。</desc><style>.bg{fill:#f8fafc}.step{fill:#e0f2fe;stroke:#0284c7}.prod{fill:#dcfce7;stroke:#22c55e}.box{stroke-width:2;rx:14}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">建造者：把复杂对象的构建步骤显式化</text><rect class="box step" x="90" y="170" width="180" height="86" rx="14"/><text class="t" x="132" y="207">builder()</text><text class="s" x="122" y="234">创建建造者</text><rect class="box step" x="330" y="100" width="190" height="70" rx="14"/><text class="s" x="372" y="142">设置必填字段</text><rect class="box step" x="330" y="215" width="190" height="70" rx="14"/><text class="s" x="372" y="257">设置可选参数</text><rect class="box step" x="330" y="330" width="190" height="70" rx="14"/><text class="s" x="372" y="372">校验默认值</text><rect class="box prod" x="700" y="185" width="230" height="100" rx="14"/><text class="t" x="764" y="225">ReportTask</text><text class="s" x="742" y="253">不可变或结构清晰的产品</text><line class="line" x1="270" y1="213" x2="330" y2="135"/><line class="line" x1="270" y1="213" x2="330" y2="250"/><line class="line" x1="270" y1="213" x2="330" y2="365"/><line class="line" x1="520" y1="250" x2="700" y2="235"/><polygon class="arrow" points="700,235 687,227 687,243"/></svg>
