<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc"><title id="title">适配器模式结构图</title><desc id="desc">展示适配器把已有接口转换为客户端期望的目标接口。</desc><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:14}.target{fill:#e0f2fe;stroke:#0284c7}.adapter{fill:#dcfce7;stroke:#22c55e}.t{font:700 19px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.s{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="520" rx="22"/><text class="t" x="48" y="52">适配器：把不兼容接口转换成系统期望的接口</text><rect class="box" x="90" y="200" width="190" height="80" rx="14"/><text class="t" x="138" y="248">客户端</text><rect class="target" x="365" y="200" width="210" height="80" rx="14"/><text class="t" x="428" y="248">Target</text><rect class="adapter" x="660" y="200" width="210" height="80" rx="14"/><text class="t" x="718" y="248">Adapter</text><rect class="box" x="660" y="340" width="210" height="80" rx="14"/><text class="t" x="716" y="388">Adaptee</text><line class="line" x1="280" y1="240" x2="365" y2="240"/><polygon class="arrow" points="365,240 352,232 352,248"/><line class="line" x1="575" y1="240" x2="660" y2="240"/><polygon class="arrow" points="660,240 647,232 647,248"/><line class="line" x1="765" y1="280" x2="765" y2="340"/><polygon class="arrow" points="765,340 757,327 773,327"/></svg>
