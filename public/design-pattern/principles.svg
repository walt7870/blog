<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">设计原则关系图</title>
  <desc id="desc">展示常见设计原则如何共同指向高内聚、低耦合和可演进。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 30px Arial,'Microsoft YaHei',sans-serif;fill:#111827}.sub{font:16px Arial,'Microsoft YaHei',sans-serif;fill:#475569}
      .core{fill:#0f172a}.ct{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#fff}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.name{font:700 18px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.txt{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#475569}
      .line{stroke:#94a3b8;stroke-width:2}.a{stroke:#06b6d4}.b{stroke:#22c55e}.c{stroke:#f97316}.d{stroke:#8b5cf6}
    </style>
  </defs>
  <rect class="bg" width="1120" height="620" rx="24"/>
  <text class="title" x="56" y="58">设计原则：模式背后的判断标准</text>
  <text class="sub" x="56" y="88">模式解决的是局部设计问题，原则决定什么时候该用、用到什么程度。</text>
  <circle class="core" cx="560" cy="320" r="92"/>
  <text class="ct" x="501" y="310">高内聚</text>
  <text class="ct" x="501" y="342">低耦合</text>
  <line class="line a" x1="488" y1="260" x2="296" y2="160"/>
  <line class="line b" x1="632" y1="260" x2="824" y2="160"/>
  <line class="line c" x1="488" y1="380" x2="296" y2="482"/>
  <line class="line d" x1="632" y1="380" x2="824" y2="482"/>
  <rect class="box" x="76" y="112" width="300" height="112" rx="16"/>
  <text class="name" x="104" y="150">单一职责</text><text class="txt" x="104" y="180">一个模块只承担一类变化原因，</text><text class="txt" x="104" y="202">避免一个类越改越大。</text>
  <rect class="box" x="744" y="112" width="300" height="112" rx="16"/>
  <text class="name" x="772" y="150">开闭原则</text><text class="txt" x="772" y="180">新增能力尽量靠扩展，</text><text class="txt" x="772" y="202">少改已经稳定的代码。</text>
  <rect class="box" x="76" y="426" width="300" height="112" rx="16"/>
  <text class="name" x="104" y="464">依赖倒置与接口隔离</text><text class="txt" x="104" y="494">高层策略依赖抽象，接口只暴露</text><text class="txt" x="104" y="516">调用方真正需要的能力。</text>
  <rect class="box" x="744" y="426" width="300" height="112" rx="16"/>
  <text class="name" x="772" y="464">里氏替换与组合复用</text><text class="txt" x="772" y="494">继承必须保持行为一致，</text><text class="txt" x="772" y="516">能组合时不急着继承。</text>
  <rect class="box" x="410" y="62" width="300" height="82" rx="16"/>
  <text class="name" x="438" y="98">迪米特法则</text><text class="txt" x="438" y="122">对象只和必要的对象通信。</text>
  <line class="line" x1="560" y1="144" x2="560" y2="228"/>
</svg>
