<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="460" viewBox="0 0 1080 460" role="img" aria-labelledby="title desc">
  <title id="title">Nginx 请求处理链路</title>
  <desc id="desc">展示客户端请求进入 Nginx 后经过 server、location、静态文件或反向代理并记录日志的流程</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .core{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.app{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:10}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:19px;font-weight:700}.body{font-size:13px}.small{font-size:12px;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1080" height="460"/>
  <rect class="box" x="35" y="180" width="130" height="80"/>
  <text class="text title" x="100" y="212" text-anchor="middle">客户端</text>
  <text class="text body" x="100" y="238" text-anchor="middle">域名、端口、URI</text>
  <rect class="core" x="215" y="165" width="150" height="110"/>
  <text class="text title" x="290" y="202" text-anchor="middle">server</text>
  <text class="text body" x="290" y="230" text-anchor="middle">listen + server_name</text>
  <text class="text small" x="290" y="252" text-anchor="middle">先选站点</text>
  <rect class="core" x="415" y="165" width="150" height="110"/>
  <text class="text title" x="490" y="202" text-anchor="middle">location</text>
  <text class="text body" x="490" y="230" text-anchor="middle">按 URI 匹配规则</text>
  <text class="text small" x="490" y="252" text-anchor="middle">再选处理方式</text>
  <rect class="app" x="640" y="70" width="155" height="90"/>
  <text class="text title" x="718" y="105" text-anchor="middle">静态资源</text>
  <text class="text body" x="718" y="132" text-anchor="middle">root / try_files</text>
  <rect class="app" x="640" y="200" width="155" height="90"/>
  <text class="text title" x="718" y="235" text-anchor="middle">反向代理</text>
  <text class="text body" x="718" y="262" text-anchor="middle">proxy_pass</text>
  <rect class="app" x="640" y="330" width="155" height="90"/>
  <text class="text title" x="718" y="365" text-anchor="middle">重定向/改写</text>
  <text class="text body" x="718" y="392" text-anchor="middle">return / rewrite</text>
  <rect class="warn" x="875" y="180" width="160" height="80"/>
  <text class="text title" x="955" y="212" text-anchor="middle">日志与响应</text>
  <text class="text body" x="955" y="238" text-anchor="middle">access / error</text>
  <path class="line" d="M165 220 L215 220"/>
  <path class="line" d="M365 220 L415 220"/>
  <path class="line" d="M565 205 C600 165 610 115 640 115"/>
  <path class="line" d="M565 220 L640 245"/>
  <path class="line" d="M565 235 C600 305 610 375 640 375"/>
  <path class="line" d="M795 115 C845 140 860 185 875 205"/>
  <path class="line" d="M795 245 L875 225"/>
  <path class="line" d="M795 375 C845 340 860 265 875 240"/>
</svg>
