<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Android Studio JDK selection flow</title>
  <desc id="desc">A diagram showing which JDK setting to check for build, editor, and IDE runtime issues.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.5; filter: url(#shadow); }
      .head { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .pill { fill: #eff6ff; stroke: #bfdbfe; }
      .line { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .muted { fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="920" height="420" rx="18"/>
  <text class="head" x="36" y="44">Android Studio 里先判断问题属于哪一层</text>
  <text class="body" x="36" y="72">构建、编辑器索引、IDE 本体运行时是三条不同链路，排查时不要混在一起改。</text>

  <rect class="card" x="36" y="112" width="248" height="206" rx="14"/>
  <rect class="pill" x="58" y="136" width="112" height="30" rx="15"/>
  <text class="small" x="76" y="156">Build fails</text>
  <text class="title" x="58" y="196">Gradle JDK</text>
  <text class="body" x="58" y="224">Gradle Daemon 和 AGP</text>
  <text class="body" x="58" y="246">实际运行使用的 JDK</text>
  <text class="small" x="58" y="282">Settings -> Build Tools -> Gradle</text>

  <rect class="card" x="336" y="112" width="248" height="206" rx="14"/>
  <rect class="pill" x="358" y="136" width="132" height="30" rx="15"/>
  <text class="small" x="376" y="156">Code is red</text>
  <text class="title" x="358" y="196">Project SDK</text>
  <text class="body" x="358" y="224">影响代码分析、索引、</text>
  <text class="body" x="358" y="246">跳转和编辑器提示</text>
  <text class="small" x="358" y="282">Project Structure -> Project</text>

  <rect class="card" x="636" y="112" width="248" height="206" rx="14"/>
  <rect class="pill" x="658" y="136" width="124" height="30" rx="15"/>
  <text class="small" x="676" y="156">IDE issue</text>
  <text class="title" x="658" y="196">IDE Runtime</text>
  <text class="body" x="658" y="224">Android Studio 本体</text>
  <text class="body" x="658" y="246">运行使用的 Runtime</text>
  <text class="small" x="658" y="282">Help -> Change IDE Boot Runtime</text>

  <path class="line" d="M 284 215 C 304 215, 314 215, 336 215"/>
  <path class="line" d="M 584 215 C 604 215, 614 215, 636 215"/>

  <text class="body muted" x="86" y="364">优先级：构建错误先看 Gradle JDK；构建通过但 IDE 飘红再看 Project SDK；IDE 本体异常才改 Runtime。</text>
</svg>
