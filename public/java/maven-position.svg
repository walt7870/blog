<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Maven 在 Java 工程中的位置</title>
  <desc id="desc">展示 pom、仓库、生命周期、插件、源码和产物之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.core{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.repo{fill:#ecfdf5;stroke:#059669;stroke-width:2}.phase{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.out{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}.t{font:700 22px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.h{font:700 16px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.s{font:14px Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.m{font:13px Consolas,monospace;fill:#334155}.line{stroke:#2563eb;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.muted{stroke:#94a3b8;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="520" rx="22"/>
  <text class="t" x="56" y="50">Maven：把 Java 工程变成可重复构建的产物</text>
  <text class="s" x="56" y="80">核心链路是项目模型、依赖仓库、生命周期和插件执行。</text>

  <rect class="box" x="58" y="150" width="180" height="110" rx="14"/>
  <text class="h" x="148" y="188" text-anchor="middle">源码与资源</text>
  <text class="m" x="148" y="218" text-anchor="middle">src/main/java</text>
  <text class="m" x="148" y="242" text-anchor="middle">src/test/java</text>

  <rect class="core" x="310" y="120" width="210" height="170" rx="14"/>
  <text class="h" x="415" y="160" text-anchor="middle">pom.xml</text>
  <text class="s" x="415" y="194" text-anchor="middle">项目坐标</text>
  <text class="s" x="415" y="220" text-anchor="middle">依赖声明</text>
  <text class="s" x="415" y="246" text-anchor="middle">插件配置</text>

  <rect class="repo" x="595" y="78" width="200" height="126" rx="14"/>
  <text class="h" x="695" y="118" text-anchor="middle">仓库</text>
  <text class="s" x="695" y="150" text-anchor="middle">本地仓库</text>
  <text class="s" x="695" y="176" text-anchor="middle">私服 / 中央仓库</text>

  <rect class="phase" x="595" y="270" width="200" height="126" rx="14"/>
  <text class="h" x="695" y="310" text-anchor="middle">生命周期</text>
  <text class="s" x="695" y="342" text-anchor="middle">compile / test</text>
  <text class="s" x="695" y="368" text-anchor="middle">package / deploy</text>

  <rect class="phase" x="870" y="270" width="190" height="126" rx="14"/>
  <text class="h" x="965" y="310" text-anchor="middle">插件</text>
  <text class="s" x="965" y="342" text-anchor="middle">编译、测试</text>
  <text class="s" x="965" y="368" text-anchor="middle">打包、发布</text>

  <rect class="out" x="870" y="96" width="190" height="108" rx="14"/>
  <text class="h" x="965" y="136" text-anchor="middle">构建产物</text>
  <text class="m" x="965" y="168" text-anchor="middle">target/*.jar</text>
  <text class="m" x="965" y="192" text-anchor="middle">target/*.war</text>

  <path class="line" d="M238 205H310"/>
  <path class="line" d="M520 174C550 146 562 142 595 142"/>
  <path class="line" d="M520 232C552 290 552 333 595 333"/>
  <path class="line" d="M795 333H870"/>
  <path class="line" d="M965 270V204"/>
  <path class="muted" d="M795 142H870"/>
  <text class="m" x="250" y="188">读取项目模型</text>
  <text class="m" x="806" y="126">解析依赖</text>
  <text class="m" x="812" y="316">绑定目标</text>
</svg>
