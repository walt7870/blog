<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">AEC 自适应滤波原理</title>
  <desc id="desc">展示播放参考、真实回声路径、估计回声和残差信号的关系</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#94a3b8;stroke-width:1.5;rx:10}.blue{fill:#eff6ff;stroke:#93c5fd}.green{fill:#ecfdf5;stroke:#86efac}.orange{fill:#fff7ed;stroke:#fdba74}.pink{fill:#fdf2f8;stroke:#f9a8d4}
      .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:1.7;stroke-dasharray:6 6;fill:none;marker-end:url(#arrow)}
      .title{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:18px;font-weight:650;fill:#0f172a}.txt{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;fill:#334155}.small{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:12px;fill:#64748b}
    </style>
  </defs>
  <rect class="bg" width="1080" height="500"/>
  <rect class="blue" x="50" y="80" width="160" height="82" rx="10"/>
  <text class="title" x="86" y="115">播放参考</text>
  <text class="txt" x="78" y="140">系统准备放出的声音</text>
  <rect class="orange" x="300" y="54" width="180" height="86" rx="10"/>
  <text class="title" x="344" y="90">真实回声路径</text>
  <text class="txt" x="326" y="116">扬声器、外壳、房间反射</text>
  <rect class="green" x="300" y="188" width="180" height="86" rx="10"/>
  <text class="title" x="344" y="224">自适应滤波器</text>
  <text class="txt" x="326" y="250">不断逼近真实回声路径</text>
  <rect class="box" x="565" y="54" width="160" height="86"/>
  <text class="title" x="606" y="90">麦克风</text>
  <text class="txt" x="594" y="116">近端人声 + 回声</text>
  <rect class="box" x="565" y="188" width="160" height="86"/>
  <text class="title" x="606" y="224">估计回声</text>
  <text class="txt" x="598" y="250">由滤波器生成</text>
  <rect class="pink" x="810" y="122" width="170" height="86" rx="10"/>
  <text class="title" x="858" y="158">相减</text>
  <text class="txt" x="838" y="184">留下近端语音残差</text>
  <path class="line" d="M210 121 H300"/>
  <path class="line" d="M210 121 C250 121 250 231 300 231"/>
  <path class="line" d="M480 97 H565"/>
  <path class="line" d="M480 231 H565"/>
  <path class="line" d="M725 97 C765 97 765 150 810 150"/>
  <path class="line" d="M725 231 C765 231 765 180 810 180"/>
  <path class="dash" d="M895 208 V310 Q895 328 877 328 H390 Q372 328 372 274"/>
  <text class="small" x="405" y="350">残差信号反向更新滤波器：残留回声越大，滤波器越需要继续调整。</text>
  <rect class="box" x="76" y="382" width="908" height="64"/>
  <text class="txt" x="104" y="421">AEC 的本质不是简单降低音量，而是估计“播放声音经过环境后变成了什么样”。参考缺失、延迟漂移、扬声器破音都会让估计失准。</text>
</svg>
