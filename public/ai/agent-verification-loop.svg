<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">Agent 执行验证闭环</title>
  <desc id="desc">展示 Agent 围绕订单导出执行读取、计划、修改、验证、修复和汇报的循环</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:12}.core{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:14}.ok{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:18px;font-weight:700}.b{font-size:13px;fill:#475569}.line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1080" height="500"/>
  <text class="text h" x="540" y="42" text-anchor="middle">Agent 的价值在于失败后继续闭环</text>
  <rect class="core" x="455" y="190" width="170" height="100"/>
  <text class="text h" x="540" y="230" text-anchor="middle">Agent</text>
  <text class="text b" x="540" y="258" text-anchor="middle">按规格行动</text>
  <rect class="box" x="455" y="65" width="170" height="80"/>
  <text class="text h" x="540" y="98" text-anchor="middle">读取</text>
  <text class="text b" x="540" y="123" text-anchor="middle">代码、上下文、测试</text>
  <rect class="box" x="755" y="155" width="170" height="80"/>
  <text class="text h" x="840" y="188" text-anchor="middle">计划</text>
  <text class="text b" x="840" y="213" text-anchor="middle">拆步骤和风险</text>
  <rect class="box" x="755" y="310" width="170" height="80"/>
  <text class="text h" x="840" y="343" text-anchor="middle">修改</text>
  <text class="text b" x="840" y="368" text-anchor="middle">页面、接口、测试</text>
  <rect class="warn" x="455" y="365" width="170" height="80"/>
  <text class="text h" x="540" y="398" text-anchor="middle">验证</text>
  <text class="text b" x="540" y="423" text-anchor="middle">test、build、检查</text>
  <rect class="box" x="155" y="310" width="170" height="80"/>
  <text class="text h" x="240" y="343" text-anchor="middle">修复</text>
  <text class="text b" x="240" y="368" text-anchor="middle">根据错误回改</text>
  <rect class="ok" x="155" y="155" width="170" height="80"/>
  <text class="text h" x="240" y="188" text-anchor="middle">汇报</text>
  <text class="text b" x="240" y="213" text-anchor="middle">diff、结果、风险</text>
  <path class="line" d="M540 145 L540 190"/><path class="line" d="M625 225 L755 195"/><path class="line" d="M840 235 L840 310"/><path class="line" d="M755 350 L625 390"/><path class="line" d="M455 405 L325 350"/><path class="line" d="M240 310 L240 235"/><path class="line" d="M325 195 L455 225"/>
</svg>
