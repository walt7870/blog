<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="540" viewBox="0 0 1180 540" role="img" aria-labelledby="title desc">
  <title id="title">AI 项目交付闭环</title>
  <desc id="desc">展示从需求、Spec Driven、AI Agent、Harness、CI/CD、PR Review 到部署的交付流程</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:12}.spec{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.agent{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.guard{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.ok{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:18px;font-weight:700}.b{font-size:13px;fill:#475569}.s{font-size:12px;fill:#64748b}.line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1180" height="540"/>
  <text class="text h" x="590" y="42" text-anchor="middle">从需求到部署的 AI 交付链路</text>
  <rect class="box" x="45" y="115" width="140" height="100"/>
  <text class="text h" x="115" y="150" text-anchor="middle">需求</text>
  <text class="text b" x="115" y="177" text-anchor="middle">业务目标</text>
  <text class="text b" x="115" y="198" text-anchor="middle">角色和范围</text>
  <rect class="spec" x="220" y="115" width="155" height="100"/>
  <text class="text h" x="298" y="150" text-anchor="middle">Spec Driven</text>
  <text class="text b" x="298" y="177" text-anchor="middle">需求、设计</text>
  <text class="text b" x="298" y="198" text-anchor="middle">任务、验收</text>
  <rect class="agent" x="410" y="115" width="145" height="100"/>
  <text class="text h" x="482" y="150" text-anchor="middle">AI Agent</text>
  <text class="text b" x="482" y="177" text-anchor="middle">读上下文</text>
  <text class="text b" x="482" y="198" text-anchor="middle">写代码和测试</text>
  <rect class="guard" x="590" y="115" width="145" height="100"/>
  <text class="text h" x="662" y="150" text-anchor="middle">Harness</text>
  <text class="text b" x="662" y="177" text-anchor="middle">权限限制</text>
  <text class="text b" x="662" y="198" text-anchor="middle">风险检查</text>
  <rect class="box" x="770" y="115" width="145" height="100"/>
  <text class="text h" x="842" y="150" text-anchor="middle">CI/CD</text>
  <text class="text b" x="842" y="177" text-anchor="middle">编译、测试</text>
  <text class="text b" x="842" y="198" text-anchor="middle">安全扫描</text>
  <rect class="box" x="950" y="115" width="145" height="100"/>
  <text class="text h" x="1022" y="150" text-anchor="middle">PR Review</text>
  <text class="text b" x="1022" y="177" text-anchor="middle">人工确认</text>
  <text class="text b" x="1022" y="198" text-anchor="middle">业务和风险</text>
  <path class="line" d="M185 165 L220 165"/><path class="line" d="M375 165 L410 165"/><path class="line" d="M555 165 L590 165"/><path class="line" d="M735 165 L770 165"/><path class="line" d="M915 165 L950 165"/>
  <rect class="ok" x="450" y="315" width="280" height="105"/>
  <text class="text h" x="590" y="352" text-anchor="middle">部署</text>
  <text class="text b" x="590" y="380" text-anchor="middle">环境审批、发布记录、监控、回滚</text>
  <text class="text s" x="590" y="404" text-anchor="middle">上线后的问题回流到 Spec、Harness 和 Checklist</text>
  <path class="line" d="M1022 215 C1022 290 735 330 730 360"/>
  <path class="line" d="M450 365 C290 365 190 300 115 215"/>
  <path class="line" d="M590 315 C590 270 662 250 662 215"/>
</svg>
