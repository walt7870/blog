<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">模糊需求到可验证规格</title>
  <desc id="desc">展示订单导出需求从一句话变成目标、范围、上下文、验收和禁区的过程</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#4f46e5"/></marker>
    <style>
      .bg{fill:#f8fafc}.bad{fill:#fff1f2;stroke:#e11d48;stroke-width:2;rx:12}.good{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.item{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.h{font-size:18px;font-weight:700}.b{font-size:13px;fill:#475569}.line{stroke:#4f46e5;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1080" height="500"/>
  <text class="text h" x="540" y="42" text-anchor="middle">提示词把模糊愿望压缩成执行规格</text>
  <rect class="bad" x="60" y="160" width="250" height="145"/>
  <text class="text h" x="185" y="205" text-anchor="middle">模糊需求</text>
  <text class="text b" x="185" y="238" text-anchor="middle">给订单列表加个导出功能</text>
  <text class="text b" x="185" y="268" text-anchor="middle">字段、权限、格式都未说明</text>
  <path class="line" d="M310 232 L390 232"/>
  <rect class="good" x="390" y="80" width="630" height="310"/>
  <text class="text h" x="705" y="118" text-anchor="middle">可验证规格</text>
  <rect class="item" x="430" y="145" width="165" height="80"/>
  <text class="text h" x="512" y="176" text-anchor="middle">目标</text>
  <text class="text b" x="512" y="202" text-anchor="middle">用于每日对账</text>
  <rect class="item" x="625" y="145" width="165" height="80"/>
  <text class="text h" x="708" y="176" text-anchor="middle">范围</text>
  <text class="text b" x="708" y="202" text-anchor="middle">CSV、筛选一致</text>
  <rect class="item" x="820" y="145" width="165" height="80"/>
  <text class="text h" x="902" y="176" text-anchor="middle">上下文</text>
  <text class="text b" x="902" y="202" text-anchor="middle">页面、接口、权限</text>
  <rect class="item" x="430" y="260" width="165" height="80"/>
  <text class="text h" x="512" y="291" text-anchor="middle">验收</text>
  <text class="text b" x="512" y="317" text-anchor="middle">测试和构建通过</text>
  <rect class="item" x="625" y="260" width="165" height="80"/>
  <text class="text h" x="708" y="291" text-anchor="middle">禁区</text>
  <text class="text b" x="708" y="317" text-anchor="middle">不导出敏感字段</text>
  <rect class="item" x="820" y="260" width="165" height="80"/>
  <text class="text h" x="902" y="291" text-anchor="middle">风险</text>
  <text class="text b" x="902" y="317" text-anchor="middle">超量、失败、越权</text>
</svg>
