<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc"><title id="title">分层架构结构图</title><desc id="desc">展示表示层、应用层、领域层、基础设施层的职责和依赖方向。</desc><style>.bg{fill:#f8fafc}.layer{fill:#fff;stroke:#cbd5e1;stroke-width:2}.core{fill:#dcfce7;stroke:#22c55e}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.arrow{fill:#64748b}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="600" rx="22"/><text class="h" x="56" y="55">分层架构：按职责分层，依赖方向向内收敛</text><rect class="layer" x="170" y="100" width="700" height="78" rx="14"/><text class="h" x="220" y="145">表示层</text><text class="t" x="390" y="145">HTTP、Controller、参数校验、响应封装</text><rect class="layer" x="170" y="210" width="700" height="78" rx="14"/><text class="h" x="220" y="255">应用层</text><text class="t" x="390" y="255">用例编排、事务边界、权限校验、流程协调</text><rect class="core" x="170" y="320" width="700" height="78" rx="14"/><text class="h" x="220" y="365">领域层</text><text class="t" x="390" y="365">业务规则、实体、值对象、领域服务</text><rect class="layer" x="170" y="430" width="700" height="78" rx="14"/><text class="h" x="220" y="475">基础设施层</text><text class="t" x="390" y="475">数据库、缓存、消息、第三方 SDK、文件系统</text><line class="line" x1="520" y1="178" x2="520" y2="210"/><polygon class="arrow" points="520,210 512,197 528,197"/><line class="line" x1="520" y1="288" x2="520" y2="320"/><polygon class="arrow" points="520,320 512,307 528,307"/><line class="line" x1="520" y1="398" x2="520" y2="430"/><polygon class="arrow" points="520,430 512,417 528,417"/></svg>
