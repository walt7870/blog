<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc"><title id="title">SOA 架构结构图</title><desc id="desc">展示客户端通过服务总线访问多个企业服务。</desc><style>.bg{fill:#f8fafc}.bus{fill:#1e293b}.svc{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.client{fill:#fff;stroke:#94a3b8;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.bt{font:700 18px Arial,'Microsoft YaHei',sans-serif;fill:#fff}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="560" rx="22"/><text class="h" x="56" y="55">SOA：企业能力服务化，通过统一契约集成</text><rect class="client" x="110" y="110" width="180" height="64" rx="14"/><text class="t" x="165" y="149">系统 A</text><rect class="client" x="430" y="110" width="180" height="64" rx="14"/><text class="t" x="485" y="149">系统 B</text><rect class="client" x="750" y="110" width="180" height="64" rx="14"/><text class="t" x="805" y="149">系统 C</text><rect class="bus" x="330" y="245" width="380" height="82" rx="16"/><text class="bt" x="430" y="292">服务总线 / API 网关</text><rect class="svc" x="100" y="410" width="220" height="76" rx="14"/><text class="t" x="165" y="455">客户服务</text><rect class="svc" x="410" y="410" width="220" height="76" rx="14"/><text class="t" x="475" y="455">订单服务</text><rect class="svc" x="720" y="410" width="220" height="76" rx="14"/><text class="t" x="785" y="455">支付服务</text><line class="line" x1="200" y1="174" x2="430" y2="245"/><line class="line" x1="520" y1="174" x2="520" y2="245"/><line class="line" x1="840" y1="174" x2="610" y2="245"/><line class="line" x1="520" y1="327" x2="210" y2="410"/><line class="line" x1="520" y1="327" x2="520" y2="410"/><line class="line" x1="520" y1="327" x2="830" y2="410"/></svg>
