<svg width="1120" height="640" viewBox="0 0 1120 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="640" rx="18" fill="#F8FAFC"/>
  <text x="56" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0F172A">领域驱动设计从业务到代码的路径</text>
  <text x="56" y="88" font-family="Arial, sans-serif" font-size="15" fill="#475569">先把业务语言和边界讲清楚，再把规则放进模型，最后用代码和事件承载协作。</text>

  <defs>
    <marker id="arrow-ddd-overview" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#64748B"/>
    </marker>
    <filter id="soft-ddd-overview" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="56" y="130" width="198" height="120" rx="12" fill="#FFF7ED" stroke="#FDBA74" filter="url(#soft-ddd-overview)"/>
  <text x="82" y="166" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">业务现场</text>
  <text x="82" y="197" font-family="Arial, sans-serif" font-size="14" fill="#7C2D12">订单已创建</text>
  <text x="82" y="221" font-family="Arial, sans-serif" font-size="14" fill="#7C2D12">支付已完成</text>

  <rect x="330" y="130" width="198" height="120" rx="12" fill="#ECFEFF" stroke="#67E8F9" filter="url(#soft-ddd-overview)"/>
  <text x="356" y="166" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#155E75">统一语言</text>
  <text x="356" y="197" font-family="Arial, sans-serif" font-size="14" fill="#164E63">业务词进入代码</text>
  <text x="356" y="221" font-family="Arial, sans-serif" font-size="14" fill="#164E63">减少同词不同义</text>

  <rect x="604" y="130" width="198" height="120" rx="12" fill="#EFF6FF" stroke="#93C5FD" filter="url(#soft-ddd-overview)"/>
  <text x="630" y="166" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1D4ED8">限界上下文</text>
  <text x="630" y="197" font-family="Arial, sans-serif" font-size="14" fill="#1E3A8A">订单、库存、支付</text>
  <text x="630" y="221" font-family="Arial, sans-serif" font-size="14" fill="#1E3A8A">各自拥有模型边界</text>

  <rect x="878" y="130" width="186" height="120" rx="12" fill="#F0FDF4" stroke="#86EFAC" filter="url(#soft-ddd-overview)"/>
  <text x="904" y="166" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">上下文协作</text>
  <text x="904" y="197" font-family="Arial, sans-serif" font-size="14" fill="#14532D">接口、防腐层</text>
  <text x="904" y="221" font-family="Arial, sans-serif" font-size="14" fill="#14532D">领域事件</text>

  <path d="M254 190H318" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow-ddd-overview)"/>
  <path d="M528 190H592" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow-ddd-overview)"/>
  <path d="M802 190H866" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow-ddd-overview)"/>

  <rect x="128" y="330" width="250" height="180" rx="14" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#soft-ddd-overview)"/>
  <text x="158" y="367" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">战略设计</text>
  <text x="158" y="402" font-family="Arial, sans-serif" font-size="14" fill="#334155">子域：识别业务重要性</text>
  <text x="158" y="430" font-family="Arial, sans-serif" font-size="14" fill="#334155">上下文：划清模型语义</text>
  <text x="158" y="458" font-family="Arial, sans-serif" font-size="14" fill="#334155">映射：说明边界协作</text>
  <text x="158" y="486" font-family="Arial, sans-serif" font-size="14" fill="#334155">团队围绕边界演进</text>

  <rect x="742" y="330" width="250" height="180" rx="14" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#soft-ddd-overview)"/>
  <text x="772" y="367" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">战术设计</text>
  <text x="772" y="402" font-family="Arial, sans-serif" font-size="14" fill="#334155">实体：承载身份和行为</text>
  <text x="772" y="430" font-family="Arial, sans-serif" font-size="14" fill="#334155">值对象：封装描述和值</text>
  <text x="772" y="458" font-family="Arial, sans-serif" font-size="14" fill="#334155">聚合：保护一致性边界</text>
  <text x="772" y="486" font-family="Arial, sans-serif" font-size="14" fill="#334155">事件：表达已发生事实</text>

  <rect x="454" y="366" width="212" height="108" rx="54" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="501" y="407" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">领域模型</text>
  <text x="490" y="438" font-family="Arial, sans-serif" font-size="14" fill="#475569">业务规则在代码中有位置</text>

  <path d="M378 420H442" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow-ddd-overview)"/>
  <path d="M666 420H730" stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow-ddd-overview)"/>
  <path d="M560 250V352" stroke="#64748B" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrow-ddd-overview)"/>

  <rect x="220" y="548" width="680" height="48" rx="24" fill="#0F172A"/>
  <text x="274" y="578" font-family="Arial, sans-serif" font-size="15" fill="#E2E8F0">落地结果：核心规则不再散落，边界协作可追踪，模型可以解释业务变化。</text>
</svg>
