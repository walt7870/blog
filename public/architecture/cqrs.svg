<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc"><title id="title">CQRS 架构结构图</title><desc id="desc">展示写模型处理命令并发布事件，读模型异步构建查询视图。</desc><style>.bg{fill:#f8fafc}.cmd{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.read{fill:#dcfce7;stroke:#22c55e;stroke-width:2}.bus{fill:#fff7ed;stroke:#f97316;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="600" rx="22"/><text class="h" x="56" y="55">CQRS：写模型负责规则，读模型负责查询</text><rect class="cmd" x="90" y="150" width="220" height="95" rx="14"/><text class="h" x="150" y="188">命令入口</text><text class="t" x="135" y="218">创建、支付、取消</text><rect class="cmd" x="410" y="150" width="220" height="95" rx="14"/><text class="h" x="470" y="188">写模型</text><text class="t" x="450" y="218">校验业务规则</text><rect class="bus" x="410" y="310" width="220" height="80" rx="14"/><text class="h" x="470" y="358">领域事件</text><rect class="read" x="730" y="150" width="220" height="95" rx="14"/><text class="h" x="790" y="188">查询入口</text><text class="t" x="775" y="218">列表、详情、报表</text><rect class="read" x="730" y="310" width="220" height="95" rx="14"/><text class="h" x="790" y="348">读模型</text><text class="t" x="770" y="378">冗余视图 / 索引</text><line class="line" x1="310" y1="198" x2="410" y2="198"/><polygon class="arrow" points="410,198 397,190 397,206"/><line class="line" x1="520" y1="245" x2="520" y2="310"/><polygon class="arrow" points="520,310 512,297 528,297"/><line class="line" x1="630" y1="350" x2="730" y2="358"/><polygon class="arrow" points="730,358 717,350 717,366"/><line class="line" x1="840" y1="310" x2="840" y2="245"/><polygon class="arrow" points="840,245 832,258 848,258"/></svg>
