<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc"><title id="title">Serverless 架构结构图</title><desc id="desc">展示事件源触发函数，函数访问托管云服务。</desc><style>.bg{fill:#f8fafc}.event{fill:#fff7ed;stroke:#f97316;stroke-width:2}.fn{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.svc{fill:#dcfce7;stroke:#22c55e;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="560" rx="22"/><text class="h" x="56" y="55">Serverless：事件触发函数，平台托管运行环境</text><rect class="event" x="95" y="115" width="210" height="70" rx="14"/><text class="t" x="150" y="157">HTTP 请求</text><rect class="event" x="95" y="245" width="210" height="70" rx="14"/><text class="t" x="155" y="287">文件上传</text><rect class="event" x="95" y="375" width="210" height="70" rx="14"/><text class="t" x="155" y="417">定时任务</text><rect class="fn" x="430" y="220" width="220" height="110" rx="16"/><text class="h" x="490" y="260">函数</text><text class="t" x="478" y="290">短任务 / 无状态</text><rect class="svc" x="775" y="115" width="190" height="70" rx="14"/><text class="t" x="835" y="157">数据库</text><rect class="svc" x="775" y="245" width="190" height="70" rx="14"/><text class="t" x="835" y="287">对象存储</text><rect class="svc" x="775" y="375" width="190" height="70" rx="14"/><text class="t" x="835" y="417">消息队列</text><line class="line" x1="305" y1="150" x2="430" y2="250"/><line class="line" x1="305" y1="280" x2="430" y2="275"/><line class="line" x1="305" y1="410" x2="430" y2="300"/><line class="line" x1="650" y1="275" x2="775" y2="150"/><line class="line" x1="650" y1="275" x2="775" y2="280"/><line class="line" x1="650" y1="275" x2="775" y2="410"/></svg>
