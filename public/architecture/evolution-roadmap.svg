<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">架构演进路线图</title>
  <desc id="desc">展示从分层单体到模块化单体、领域建模、微服务和云原生的渐进式演进路径。</desc>
  <style>
    .bg{fill:#f8fafc}.title{font:700 30px Arial,'Microsoft YaHei',sans-serif;fill:#111827}.sub{font:16px Arial,'Microsoft YaHei',sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.h{font:700 17px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:14px Arial,'Microsoft YaHei',sans-serif;fill:#475569}.line{stroke:#64748b;stroke-width:3}.arrow{fill:#64748b}.note{fill:#fff7ed;stroke:#f97316;stroke-width:2}
  </style>
  <rect class="bg" width="1120" height="640" rx="24"/>
  <text class="title" x="56" y="58">架构演进路线</text>
  <text class="sub" x="56" y="88">优先选择能覆盖当前复杂度的最简单架构，在复杂度真实出现后再演进。</text>
  <line class="line" x1="110" y1="300" x2="990" y2="300"/><polygon class="arrow" points="990,300 974,290 974,310"/>
  <rect class="box" x="70" y="190" width="180" height="120" rx="16"/>
  <text class="h" x="108" y="232">分层单体</text><text class="t" x="100" y="262">交付路径短</text><text class="t" x="100" y="286">运维成本低</text>
  <rect class="box" x="285" y="190" width="180" height="120" rx="16"/>
  <text class="h" x="314" y="232">模块化单体</text><text class="t" x="315" y="262">明确模块边界</text><text class="t" x="315" y="286">限制跨模块依赖</text>
  <rect class="box" x="500" y="190" width="180" height="120" rx="16"/>
  <text class="h" x="535" y="232">DDD / 六边形</text><text class="t" x="530" y="262">业务模型清晰</text><text class="t" x="530" y="286">隔离技术细节</text>
  <rect class="box" x="715" y="190" width="180" height="120" rx="16"/>
  <text class="h" x="758" y="232">微服务</text><text class="t" x="745" y="262">团队自治</text><text class="t" x="745" y="286">独立部署</text>
  <rect class="box" x="930" y="190" width="160" height="120" rx="16"/>
  <text class="h" x="970" y="232">云原生</text><text class="t" x="955" y="262">弹性伸缩</text><text class="t" x="955" y="286">自动化治理</text>
  <rect class="note" x="120" y="420" width="880" height="96" rx="18"/>
  <text class="h" x="160" y="458">演进触发点</text>
  <text class="t" x="160" y="486">模块边界混乱、团队互相阻塞、部署频繁冲突、故障隔离要求提升、单一模块出现独立扩缩容需求。</text>
  <text class="t" x="160" y="512">没有这些信号时，应优先优化模块边界、测试和发布流程，而不是提前引入分布式复杂度。</text>
</svg>
