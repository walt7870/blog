<svg width="1120" height="640" viewBox="0 0 1120 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="640" rx="18" fill="#F8FAFC"/>
  <text x="54" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0F172A">DDD 模型元素之间的关系</text>
  <text x="54" y="88" font-family="Arial, sans-serif" font-size="15" fill="#475569">上下文先划语义边界，聚合再保护一致性，事件负责把已发生的事实送到其他边界。</text>

  <defs>
    <marker id="arrow-ddd-model" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#475569"/>
    </marker>
    <filter id="soft-ddd-model" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#94A3B8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="60" y="128" width="460" height="388" rx="18" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="88" y="164" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1D4ED8">订单上下文</text>
  <text x="88" y="190" font-family="Arial, sans-serif" font-size="14" fill="#1E3A8A">负责订单生命周期、订单金额、订单项规则</text>

  <rect x="112" y="232" width="344" height="218" rx="16" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#soft-ddd-model)"/>
  <text x="142" y="268" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1E40AF">订单聚合</text>
  <text x="142" y="294" font-family="Arial, sans-serif" font-size="13" fill="#475569">强一致边界：订单状态、订单项、订单金额</text>

  <rect x="144" y="324" width="126" height="70" rx="12" fill="#DBEAFE" stroke="#60A5FA"/>
  <text x="175" y="352" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A8A">Order</text>
  <text x="165" y="376" font-family="Arial, sans-serif" font-size="12" fill="#1E3A8A">聚合根</text>

  <rect x="306" y="310" width="112" height="58" rx="10" fill="#F8FAFC" stroke="#94A3B8"/>
  <text x="333" y="335" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">OrderLine</text>
  <text x="345" y="355" font-family="Arial, sans-serif" font-size="12" fill="#64748B">实体</text>

  <rect x="306" y="384" width="112" height="50" rx="10" fill="#F8FAFC" stroke="#94A3B8"/>
  <text x="341" y="407" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">Money</text>
  <text x="337" y="425" font-family="Arial, sans-serif" font-size="12" fill="#64748B">值对象</text>

  <path d="M270 358H294" stroke="#475569" stroke-width="2" marker-end="url(#arrow-ddd-model)"/>
  <path d="M270 366C284 366 286 408 294 408" stroke="#475569" stroke-width="2" marker-end="url(#arrow-ddd-model)"/>

  <rect x="620" y="128" width="210" height="146" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2" filter="url(#soft-ddd-model)"/>
  <text x="650" y="164" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#166534">库存上下文</text>
  <text x="650" y="198" font-family="Arial, sans-serif" font-size="14" fill="#14532D">可售、锁定、释放</text>
  <text x="650" y="224" font-family="Arial, sans-serif" font-size="14" fill="#14532D">仓库批次和库存规则</text>

  <rect x="620" y="352" width="210" height="146" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#soft-ddd-model)"/>
  <text x="650" y="388" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#9A3412">支付上下文</text>
  <text x="650" y="422" font-family="Arial, sans-serif" font-size="14" fill="#7C2D12">支付单、交易流水</text>
  <text x="650" y="448" font-family="Arial, sans-serif" font-size="14" fill="#7C2D12">退款、对账、渠道状态</text>

  <rect x="896" y="240" width="170" height="146" rx="16" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#soft-ddd-model)"/>
  <text x="926" y="276" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#6D28D9">履约上下文</text>
  <text x="926" y="310" font-family="Arial, sans-serif" font-size="14" fill="#581C87">发货单、包裹</text>
  <text x="926" y="336" font-family="Arial, sans-serif" font-size="14" fill="#581C87">配送和签收</text>

  <rect x="440" y="548" width="240" height="52" rx="26" fill="#0F172A"/>
  <text x="482" y="580" font-family="Arial, sans-serif" font-size="15" fill="#E2E8F0">OrderPaid：订单已支付</text>

  <path d="M456 342C526 342 540 202 608 202" stroke="#475569" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrow-ddd-model)"/>
  <path d="M456 370C526 370 540 428 608 428" stroke="#475569" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrow-ddd-model)"/>
  <path d="M830 274C858 274 858 300 884 300" stroke="#475569" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrow-ddd-model)"/>
  <path d="M284 450C330 534 400 572 428 572" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow-ddd-model)"/>
  <path d="M680 572C770 572 862 432 910 390" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow-ddd-model)"/>
</svg>
