<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc"><title id="title">六边形架构结构图</title><desc id="desc">展示业务核心通过端口与外部适配器交互。</desc><style>.bg{fill:#f8fafc}.core{fill:#dcfce7;stroke:#22c55e;stroke-width:3}.port{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.adp{fill:#fff;stroke:#94a3b8;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="620" rx="22"/><text class="h" x="56" y="55">六边形架构：业务核心不依赖外部技术</text><polygon class="core" points="520,145 680,235 680,405 520,495 360,405 360,235"/><text class="h" x="455" y="300">业务核心</text><text class="t" x="430" y="330">领域模型 / 用例</text><rect class="port" x="420" y="95" width="200" height="54" rx="12"/><text class="t" x="462" y="129">输入端口</text><rect class="port" x="420" y="492" width="200" height="54" rx="12"/><text class="t" x="462" y="526">输出端口</text><rect class="adp" x="85" y="170" width="210" height="70" rx="14"/><text class="t" x="140" y="212">HTTP 适配器</text><rect class="adp" x="85" y="380" width="210" height="70" rx="14"/><text class="t" x="140" y="422">消息适配器</text><rect class="adp" x="745" y="170" width="210" height="70" rx="14"/><text class="t" x="800" y="212">数据库适配器</text><rect class="adp" x="745" y="380" width="210" height="70" rx="14"/><text class="t" x="790" y="422">第三方 API 适配器</text><line class="line" x1="295" y1="205" x2="360" y2="250"/><line class="line" x1="295" y1="415" x2="360" y2="390"/><line class="line" x1="680" y1="250" x2="745" y2="205"/><line class="line" x1="680" y1="390" x2="745" y2="415"/></svg>
