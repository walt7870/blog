<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc"><title id="title">DDD 领域驱动设计结构图</title><desc id="desc">展示统一语言、限界上下文、聚合和领域事件之间的关系。</desc><style>.bg{fill:#f8fafc}.ctx{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.agg{fill:#dcfce7;stroke:#22c55e;stroke-width:2}.evt{fill:#fff7ed;stroke:#f97316;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="620" rx="22"/><text class="h" x="56" y="55">DDD：围绕业务语言和边界组织模型</text><rect class="ctx" x="120" y="120" width="330" height="270" rx="18"/><text class="h" x="215" y="160">订单上下文</text><rect class="agg" x="170" y="205" width="230" height="70" rx="14"/><text class="t" x="240" y="247">订单聚合</text><rect class="evt" x="170" y="300" width="230" height="54" rx="14"/><text class="t" x="230" y="333">OrderPaid</text><rect class="ctx" x="590" y="120" width="330" height="270" rx="18"/><text class="h" x="685" y="160">库存上下文</text><rect class="agg" x="640" y="205" width="230" height="70" rx="14"/><text class="t" x="710" y="247">库存聚合</text><rect class="evt" x="640" y="300" width="230" height="54" rx="14"/><text class="t" x="704" y="333">StockLocked</text><line class="line" x1="400" y1="327" x2="640" y2="327"/><text class="t" x="455" y="315">领域事件协作</text><rect class="evt" x="315" y="470" width="410" height="70" rx="14"/><text class="h" x="430" y="500">统一语言</text><text class="t" x="375" y="526">业务、产品、开发使用同一套概念和词汇</text></svg>
