<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc"><title id="title">云原生架构能力图</title><desc id="desc">展示云原生系统围绕容器、编排、弹性、可观测和发布治理构建。</desc><style>.bg{fill:#f8fafc}.core{fill:#1e293b}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.ct{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#fff}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#94a3b8;stroke-width:2}</style><rect class="bg" width="1040" height="620" rx="22"/><text class="h" x="56" y="55">云原生：让系统适合在云和容器平台上弹性运行</text><circle class="core" cx="520" cy="310" r="95"/><text class="ct" x="470" y="303">应用服务</text><text class="ct" x="452" y="335">容器化运行</text><rect class="box" x="105" y="120" width="220" height="90" rx="14"/><text class="h" x="155" y="157">容器镜像</text><text class="t" x="145" y="184">一致交付单元</text><rect class="box" x="715" y="120" width="220" height="90" rx="14"/><text class="h" x="765" y="157">编排调度</text><text class="t" x="755" y="184">Kubernetes</text><rect class="box" x="105" y="410" width="220" height="90" rx="14"/><text class="h" x="155" y="447">可观测性</text><text class="t" x="135" y="474">日志 / 指标 / 追踪</text><rect class="box" x="715" y="410" width="220" height="90" rx="14"/><text class="h" x="765" y="447">发布治理</text><text class="t" x="755" y="474">灰度 / 回滚 / 弹性</text><line class="line" x1="325" y1="165" x2="450" y2="260"/><line class="line" x1="715" y1="165" x2="590" y2="260"/><line class="line" x1="325" y1="455" x2="450" y2="360"/><line class="line" x1="715" y1="455" x2="590" y2="360"/></svg>
