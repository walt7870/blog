<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc"><title id="title">微服务架构结构图</title><desc id="desc">展示网关、独立服务、独立数据库和平台治理能力。</desc><style>.bg{fill:#f8fafc}.svc{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.db{fill:#dcfce7;stroke:#22c55e;stroke-width:2}.plat{fill:#fff7ed;stroke:#f97316;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}</style><rect class="bg" width="1040" height="620" rx="22"/><text class="h" x="56" y="55">微服务：按业务能力拆分独立交付单元</text><rect class="plat" x="420" y="95" width="210" height="64" rx="14"/><text class="t" x="480" y="134">API 网关</text><rect class="svc" x="110" y="230" width="200" height="82" rx="14"/><text class="h" x="155" y="266">订单服务</text><text class="t" x="150" y="290">订单数据所有者</text><rect class="svc" x="420" y="230" width="200" height="82" rx="14"/><text class="h" x="465" y="266">库存服务</text><text class="t" x="460" y="290">库存数据所有者</text><rect class="svc" x="730" y="230" width="200" height="82" rx="14"/><text class="h" x="775" y="266">支付服务</text><text class="t" x="770" y="290">支付数据所有者</text><rect class="db" x="125" y="385" width="170" height="64" rx="14"/><text class="t" x="175" y="423">订单库</text><rect class="db" x="435" y="385" width="170" height="64" rx="14"/><text class="t" x="485" y="423">库存库</text><rect class="db" x="745" y="385" width="170" height="64" rx="14"/><text class="t" x="795" y="423">支付库</text><rect class="plat" x="250" y="500" width="540" height="62" rx="14"/><text class="t" x="310" y="538">平台治理：注册发现、配置、日志、指标、链路追踪、灰度、熔断</text><line class="line" x1="525" y1="159" x2="210" y2="230"/><line class="line" x1="525" y1="159" x2="520" y2="230"/><line class="line" x1="525" y1="159" x2="830" y2="230"/><line class="line" x1="210" y1="312" x2="210" y2="385"/><line class="line" x1="520" y1="312" x2="520" y2="385"/><line class="line" x1="830" y1="312" x2="830" y2="385"/></svg>
