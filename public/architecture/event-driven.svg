<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc"><title id="title">事件驱动架构结构图</title><desc id="desc">展示生产者发布事件到事件总线，多个消费者异步处理事件。</desc><style>.bg{fill:#f8fafc}.prod{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.bus{fill:#1e293b}.consumer{fill:#dcfce7;stroke:#22c55e;stroke-width:2}.h{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}.bt{font:700 18px Arial,'Microsoft YaHei',sans-serif;fill:#fff}.t{font:15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}.line{stroke:#64748b;stroke-width:2}.arrow{fill:#64748b}</style><rect class="bg" width="1040" height="600" rx="22"/><text class="h" x="56" y="55">事件驱动：发布事实，消费者异步响应</text><rect class="prod" x="90" y="220" width="220" height="90" rx="14"/><text class="h" x="145" y="255">订单服务</text><text class="t" x="130" y="282">发布 OrderPaid</text><rect class="bus" x="410" y="215" width="220" height="100" rx="16"/><text class="bt" x="465" y="255">事件总线</text><text class="bt" x="450" y="285">Kafka / MQ</text><rect class="consumer" x="740" y="95" width="220" height="70" rx="14"/><text class="t" x="795" y="138">库存消费者</text><rect class="consumer" x="740" y="220" width="220" height="70" rx="14"/><text class="t" x="795" y="263">消息消费者</text><rect class="consumer" x="740" y="345" width="220" height="70" rx="14"/><text class="t" x="795" y="388">积分消费者</text><line class="line" x1="310" y1="265" x2="410" y2="265"/><polygon class="arrow" points="410,265 397,257 397,273"/><line class="line" x1="630" y1="265" x2="740" y2="130"/><line class="line" x1="630" y1="265" x2="740" y2="255"/><line class="line" x1="630" y1="265" x2="740" y2="380"/></svg>
