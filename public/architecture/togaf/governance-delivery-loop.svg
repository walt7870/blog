<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">架构原则从需求进入交付，再由运行证据反馈</title>
  <desc id="desc">治理将请求、决策、开发、发布、运行和反馈连接起来，例外和债务具有范围、补偿和退出条件。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#475569"/>
    </marker>
    <marker id="loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1440" height="720" fill="#fff"/>
  <text x="72" y="60" fill="#172033" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700">治理把原则变成交付和运行中的反馈机制</text>
  <text x="72" y="97" fill="#526078" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">评审不是终点；真正的治理证据来自契约、权限、迁移、指标和旧责任退出。</text>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="72" y="170" width="190" height="150" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
    <text x="167" y="207" text-anchor="middle" fill="#9a3412" font-size="16" font-weight="700">需求</text>
    <text x="167" y="247" text-anchor="middle" fill="#172033" font-size="20" font-weight="700">业务驱动</text>
    <text x="167" y="278" text-anchor="middle" fill="#526078" font-size="14">结果、约束、范围</text>

    <rect x="302" y="170" width="190" height="150" rx="8" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
    <text x="397" y="207" text-anchor="middle" fill="#854d0e" font-size="16" font-weight="700">决策</text>
    <text x="397" y="247" text-anchor="middle" fill="#172033" font-size="20" font-weight="700">原则与 ADR</text>
    <text x="397" y="278" text-anchor="middle" fill="#526078" font-size="14">取舍、责任、复审</text>

    <rect x="532" y="170" width="190" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="627" y="207" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="700">交付</text>
    <text x="627" y="247" text-anchor="middle" fill="#172033" font-size="20" font-weight="700">开发与测试</text>
    <text x="627" y="278" text-anchor="middle" fill="#526078" font-size="14">契约、权限、数据</text>

    <rect x="762" y="170" width="190" height="150" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
    <text x="857" y="207" text-anchor="middle" fill="#166534" font-size="16" font-weight="700">发布</text>
    <text x="857" y="247" text-anchor="middle" fill="#172033" font-size="20" font-weight="700">切换与回退</text>
    <text x="857" y="278" text-anchor="middle" fill="#526078" font-size="14">灰度、迁移、演练</text>

    <rect x="992" y="170" width="190" height="150" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="1087" y="207" text-anchor="middle" fill="#6d28d9" font-size="16" font-weight="700">运行</text>
    <text x="1087" y="247" text-anchor="middle" fill="#172033" font-size="20" font-weight="700">指标与事件</text>
    <text x="1087" y="278" text-anchor="middle" fill="#526078" font-size="14">业务状态、SLO、成本</text>

    <rect x="1222" y="170" width="146" height="150" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
    <text x="1295" y="207" text-anchor="middle" fill="#155e75" font-size="16" font-weight="700">反馈</text>
    <text x="1295" y="247" text-anchor="middle" fill="#172033" font-size="20" font-weight="700">变更</text>
    <text x="1295" y="278" text-anchor="middle" fill="#526078" font-size="14">修正目标或方案</text>
  </g>
  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M262 245H294"/><path d="M492 245H524"/><path d="M722 245H754"/><path d="M952 245H984"/><path d="M1182 245H1214"/>
  </g>
  <path d="M1295 334V430Q1295 466 1259 466H181Q145 466 145 430V334" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#loop)"/>
  <rect x="300" y="416" width="840" height="100" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="720" y="454" text-anchor="middle" fill="#9a3412" font-size="20" font-weight="700">例外与债务必须有边界</text>
  <text x="720" y="486" text-anchor="middle" fill="#334155" font-size="16">范围 · 补偿措施 · 负责人 · 到期日 · 退出证据</text>
  <text x="72" y="606" fill="#172033" font-size="18" font-weight="700">治理有效的信号</text>
  <text x="72" y="639" fill="#526078" font-size="16">偏差能快速暴露，有人承担，按期收敛，业务结果改善；不是评审通过率看起来漂亮。</text>
</svg>
