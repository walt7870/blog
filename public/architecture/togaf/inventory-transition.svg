<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">库存责任从旧系统迁移到库存平台的过渡路径</title>
  <desc id="desc">库存平台从汇总和影子计算开始，随后按范围接管库存预占，旧系统逐步退出，最终成为唯一权威方。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1440" height="720" fill="#ffffff"/>
  <text x="72" y="62" fill="#172033" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700">过渡架构：迁移的是事实责任，不只是流量</text>
  <text x="72" y="99" fill="#526078" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">每个迁移范围内保持一个权威写入方；新平台先证明语义和结果，再逐步接管责任。</text>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <text x="78" y="176" fill="#172033" font-size="17" font-weight="700">阶段</text>
    <text x="78" y="279" fill="#172033" font-size="17" font-weight="700">新库存平台</text>
    <text x="78" y="399" fill="#172033" font-size="17" font-weight="700">旧渠道系统</text>
    <text x="78" y="539" fill="#172033" font-size="17" font-weight="700">通过条件</text>

    <g text-anchor="middle">
      <rect x="218" y="138" width="206" height="68" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
      <text x="321" y="166" fill="#334155" font-size="16" font-weight="700">T0 基线</text>
      <text x="321" y="190" fill="#64748b" font-size="14">分散写入</text>

      <rect x="450" y="138" width="206" height="68" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="553" y="166" fill="#1d4ed8" font-size="16" font-weight="700">T1 影子计算</text>
      <text x="553" y="190" fill="#64748b" font-size="14">只读验证</text>

      <rect x="682" y="138" width="206" height="68" rx="6" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
      <text x="785" y="166" fill="#854d0e" font-size="16" font-weight="700">T2 局部接管</text>
      <text x="785" y="190" fill="#64748b" font-size="14">按渠道或区域切换</text>

      <rect x="914" y="138" width="206" height="68" rx="6" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
      <text x="1017" y="166" fill="#9a3412" font-size="16" font-weight="700">T3 扩大接管</text>
      <text x="1017" y="190" fill="#64748b" font-size="14">旧逻辑停止新增</text>

      <rect x="1146" y="138" width="206" height="68" rx="6" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
      <text x="1249" y="166" fill="#166534" font-size="16" font-weight="700">T4 目标状态</text>
      <text x="1249" y="190" fill="#64748b" font-size="14">统一责任</text>
    </g>

    <g stroke="#475569" stroke-width="2" marker-end="url(#arrow)">
      <path d="M 424 172 L 444 172"/>
      <path d="M 656 172 L 676 172"/>
      <path d="M 888 172 L 908 172"/>
      <path d="M 1120 172 L 1140 172"/>
    </g>

    <rect x="218" y="239" width="206" height="78" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="321" y="271" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">汇总与对账</text>
    <text x="321" y="296" text-anchor="middle" fill="#64748b" font-size="14">不参与交易判断</text>

    <rect x="450" y="239" width="206" height="78" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="553" y="271" text-anchor="middle" fill="#1e40af" font-size="16" font-weight="700">计算可售库存</text>
    <text x="553" y="296" text-anchor="middle" fill="#64748b" font-size="14">与旧结果比较</text>

    <rect x="682" y="239" width="206" height="78" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="785" y="271" text-anchor="middle" fill="#92400e" font-size="16" font-weight="700">指定范围唯一写入</text>
    <text x="785" y="296" text-anchor="middle" fill="#64748b" font-size="14">预占、释放、确认</text>

    <rect x="914" y="239" width="206" height="78" rx="6" fill="#ffedd5" stroke="#fb923c"/>
    <text x="1017" y="271" text-anchor="middle" fill="#9a3412" font-size="16" font-weight="700">覆盖主要交易范围</text>
    <text x="1017" y="296" text-anchor="middle" fill="#64748b" font-size="14">统一观测与审计</text>

    <rect x="1146" y="239" width="206" height="78" rx="6" fill="#dcfce7" stroke="#4ade80"/>
    <text x="1249" y="271" text-anchor="middle" fill="#166534" font-size="16" font-weight="700">企业库存权威方</text>
    <text x="1249" y="296" text-anchor="middle" fill="#64748b" font-size="14">规则与责任收敛</text>

    <rect x="218" y="359" width="206" height="78" rx="6" fill="#fee2e2" stroke="#f87171"/>
    <text x="321" y="391" text-anchor="middle" fill="#991b1b" font-size="16" font-weight="700">各自判断与写入</text>
    <text x="321" y="416" text-anchor="middle" fill="#64748b" font-size="14">当前权威方</text>

    <rect x="450" y="359" width="206" height="78" rx="6" fill="#fee2e2" stroke="#f87171"/>
    <text x="553" y="391" text-anchor="middle" fill="#991b1b" font-size="16" font-weight="700">仍负责交易写入</text>
    <text x="553" y="416" text-anchor="middle" fill="#64748b" font-size="14">输出比较数据</text>

    <rect x="682" y="359" width="206" height="78" rx="6" fill="#fff1f2" stroke="#fda4af"/>
    <text x="785" y="391" text-anchor="middle" fill="#9f1239" font-size="16" font-weight="700">保留未迁移范围</text>
    <text x="785" y="416" text-anchor="middle" fill="#64748b" font-size="14">禁止跨范围双写</text>

    <rect x="914" y="359" width="206" height="78" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1017" y="391" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">适配与本地容错</text>
    <text x="1017" y="416" text-anchor="middle" fill="#64748b" font-size="14">旧写入口停止新增</text>

    <rect x="1146" y="359" width="206" height="78" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1249" y="391" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">只读归档或下线</text>
    <text x="1249" y="416" text-anchor="middle" fill="#64748b" font-size="14">责任正式退出</text>

    <g text-anchor="middle">
      <text x="321" y="523" fill="#334155" font-size="15" font-weight="700">差异基线建立</text>
      <text x="321" y="549" fill="#64748b" font-size="14">问题可以分类</text>

      <text x="553" y="523" fill="#334155" font-size="15" font-weight="700">语义和规则收敛</text>
      <text x="553" y="549" fill="#64748b" font-size="14">影子结果可解释</text>

      <text x="785" y="523" fill="#334155" font-size="15" font-weight="700">对账与演练通过</text>
      <text x="785" y="549" fill="#64748b" font-size="14">回退路径已验证</text>

      <text x="1017" y="523" fill="#334155" font-size="15" font-weight="700">旧逻辑无新增数据</text>
      <text x="1017" y="549" fill="#64748b" font-size="14">主要渠道已迁移</text>

      <text x="1249" y="523" fill="#334155" font-size="15" font-weight="700">旧依赖全部清退</text>
      <text x="1249" y="549" fill="#64748b" font-size="14">收益持续兑现</text>
    </g>
  </g>

  <rect x="218" y="598" width="1134" height="62" rx="6" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
  <text x="785" y="636" text-anchor="middle" fill="#155e75" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" font-weight="700">切换的核心判据：任一范围、任一时刻，谁拥有修改库存事实的最终裁决权？</text>
</svg>
