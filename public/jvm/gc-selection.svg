<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">GC 选型思路</title>
  <desc id="desc">展示根据吞吐量、延迟、堆大小和维护场景选择垃圾回收器。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.q{fill:#fff;stroke:#dbe3ef;stroke-width:1.8}.a{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.8}.old{fill:#fee2e2;stroke:#ef4444;stroke-width:1.8}.t{font:700 19px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}.s{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#334155}.m{font:12px Consolas,monospace;fill:#475569}.line{stroke:#7c3aed;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="980" height="500" rx="22"/>
  <text class="t" x="42" y="48">GC 选型：先定目标，再看约束</text>
  <text class="s" x="42" y="76">调 GC 不是背参数，而是在吞吐量、停顿、内存、CPU 和 JDK 版本之间取舍。</text>

  <rect class="q" x="70" y="132" width="220" height="82" rx="14"/><text class="t" x="104" y="168">小堆 / 工具进程</text><text class="s" x="116" y="194">简单、资源占用低</text>
  <rect class="a" x="380" y="132" width="190" height="82" rx="14"/><text class="t" x="434" y="168">Serial</text><text class="m" x="424" y="194">-XX:+UseSerialGC</text>

  <rect class="q" x="70" y="258" width="220" height="82" rx="14"/><text class="t" x="106" y="294">吞吐量优先</text><text class="s" x="118" y="320">批处理、离线任务</text>
  <rect class="a" x="380" y="258" width="190" height="82" rx="14"/><text class="t" x="426" y="294">Parallel</text><text class="m" x="414" y="320">UseParallelGC</text>

  <rect class="q" x="650" y="132" width="220" height="82" rx="14"/><text class="t" x="690" y="168">通用服务端</text><text class="s" x="704" y="194">均衡吞吐与停顿</text>
  <rect class="a" x="650" y="258" width="220" height="82" rx="14"/><text class="t" x="730" y="294">G1</text><text class="m" x="708" y="320">默认常见选择</text>

  <rect class="q" x="70" y="386" width="220" height="72" rx="14"/><text class="t" x="104" y="424">极低延迟</text>
  <rect class="a" x="380" y="386" width="190" height="72" rx="14"/><text class="t" x="424" y="424">ZGC / Shenandoah</text>

  <rect class="old" x="650" y="386" width="220" height="72" rx="14"/><text class="t" x="708" y="424">CMS / ParNew</text><text class="s" x="690" y="446">维护老系统时理解</text>

  <path class="line" d="M290 173H380"/>
  <path class="line" d="M290 299H380"/>
  <path class="line" d="M760 214V258"/>
  <path class="line" d="M290 422H380"/>
</svg>
