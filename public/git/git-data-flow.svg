<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Git data flow</title>
  <desc id="desc">A diagram showing working tree, staging area, local repository, and remote repository.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.6; }
      .head { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .cmd { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #166534; }
      .line { stroke: #16a34a; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .back { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="920" height="360" rx="18"/>
  <text class="head" x="36" y="46">Git 的数据流</text>
  <text class="body" x="36" y="74">提交前先选择进入暂存区的内容；远程同步只发生在 fetch、pull、push 等命令中。</text>

  <rect class="box" x="46" y="126" width="180" height="128" rx="14"/>
  <text class="title" x="72" y="166">工作区</text>
  <text class="body" x="72" y="194">正在编辑的文件</text>
  <text class="cmd" x="72" y="224">git diff</text>

  <rect class="box" x="276" y="126" width="180" height="128" rx="14"/>
  <text class="title" x="302" y="166">暂存区</text>
  <text class="body" x="302" y="194">下一次提交候选</text>
  <text class="cmd" x="302" y="224">git diff --staged</text>

  <rect class="box" x="506" y="126" width="180" height="128" rx="14"/>
  <text class="title" x="532" y="166">本地版本库</text>
  <text class="body" x="532" y="194">提交历史和引用</text>
  <text class="cmd" x="532" y="224">git log</text>

  <rect class="box" x="736" y="126" width="140" height="128" rx="14"/>
  <text class="title" x="762" y="166">远程仓库</text>
  <text class="body" x="762" y="194">团队共享</text>
  <text class="cmd" x="762" y="224">origin/main</text>

  <path class="line" d="M 226 190 C 246 190, 256 190, 276 190"/>
  <text class="cmd" x="238" y="176">git add</text>

  <path class="line" d="M 456 190 C 476 190, 486 190, 506 190"/>
  <text class="cmd" x="462" y="176">git commit</text>

  <path class="line" d="M 686 172 C 706 172, 716 172, 736 172"/>
  <text class="cmd" x="694" y="158">git push</text>

  <path class="back" d="M 736 218 C 716 218, 706 218, 686 218"/>
  <text class="cmd" x="694" y="244">git fetch</text>

  <text class="body" x="94" y="310">restore 可以从暂存区或版本库恢复内容；reset 会移动提交引用；revert 会新增一个反向提交。</text>
</svg>
