<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">Linux 进程模型</title>
  <desc id="desc">展示 PID 1、内核线程、用户进程、线程、资源和信号之间的关系</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .core{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.kernel{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:10}.ops{fill:#ecfdf5;stroke:#0f766e;stroke-width:2;rx:10}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:19px;font-weight:700}.body{font-size:13px}.small{font-size:12px;fill:#475569}
      .line{stroke:#2563eb;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1080" height="500"/>
  <rect class="kernel" x="420" y="35" width="240" height="85"/>
  <text class="text title" x="540" y="68" text-anchor="middle">内核</text>
  <text class="text body" x="540" y="95" text-anchor="middle">调度、内存、文件、网络</text>
  <rect class="core" x="445" y="165" width="190" height="85"/>
  <text class="text title" x="540" y="198" text-anchor="middle">PID 1</text>
  <text class="text body" x="540" y="225" text-anchor="middle">systemd / init</text>
  <rect class="kernel" x="120" y="310" width="190" height="85"/>
  <text class="text title" x="215" y="343" text-anchor="middle">内核线程</text>
  <text class="text body" x="215" y="370" text-anchor="middle">kworker / kswapd</text>
  <rect class="box" x="445" y="310" width="190" height="85"/>
  <text class="text title" x="540" y="343" text-anchor="middle">用户进程</text>
  <text class="text body" x="540" y="370" text-anchor="middle">服务、Shell、应用</text>
  <rect class="box" x="770" y="310" width="190" height="85"/>
  <text class="text title" x="865" y="343" text-anchor="middle">线程</text>
  <text class="text body" x="865" y="370" text-anchor="middle">共享进程资源</text>
  <rect class="ops" x="445" y="420" width="190" height="55"/>
  <text class="text body" x="540" y="453" text-anchor="middle">信号、优先级、资源限制</text>
  <path class="line" d="M540 120 L540 165"/>
  <path class="line" d="M500 250 C430 290 330 325 310 345"/>
  <path class="line" d="M540 250 L540 310"/>
  <path class="line" d="M635 350 L770 350"/>
  <path class="line" d="M540 395 L540 420"/>
</svg>
*** Add File: public/linux/process-state-flow.svg
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">Linux 进程状态流转</title>
  <desc id="desc">展示运行、睡眠、不可中断睡眠、停止、僵尸等状态和排查重点</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker>
    <style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}.run{fill:#ecfdf5;stroke:#0f766e;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:10}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:10}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:18px;font-weight:700}.body{font-size:13px}.small{font-size:12px;fill:#475569}.line{stroke:#0f766e;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1080" height="430"/>
  <rect class="box" x="50" y="170" width="130" height="80"/><text class="text title" x="115" y="202" text-anchor="middle">创建</text><text class="text body" x="115" y="228" text-anchor="middle">fork / exec</text>
  <rect class="run" x="240" y="170" width="130" height="80"/><text class="text title" x="305" y="202" text-anchor="middle">R 运行</text><text class="text body" x="305" y="228" text-anchor="middle">占用或等待 CPU</text>
  <rect class="box" x="450" y="70" width="150" height="80"/><text class="text title" x="525" y="102" text-anchor="middle">S 睡眠</text><text class="text body" x="525" y="128" text-anchor="middle">等待事件</text>
  <rect class="warn" x="450" y="270" width="150" height="80"/><text class="text title" x="525" y="302" text-anchor="middle">D 不可中断</text><text class="text body" x="525" y="328" text-anchor="middle">多见 I/O 卡住</text>
  <rect class="box" x="680" y="70" width="130" height="80"/><text class="text title" x="745" y="102" text-anchor="middle">T 停止</text><text class="text body" x="745" y="128" text-anchor="middle">暂停或调试</text>
  <rect class="bad" x="680" y="270" width="130" height="80"/><text class="text title" x="745" y="302" text-anchor="middle">Z 僵尸</text><text class="text body" x="745" y="328" text-anchor="middle">等待父进程回收</text>
  <rect class="box" x="875" y="170" width="130" height="80"/><text class="text title" x="940" y="202" text-anchor="middle">退出</text><text class="text body" x="940" y="228" text-anchor="middle">资源释放</text>
  <path class="line" d="M180 210 L240 210"/><path class="line" d="M370 195 C410 160 420 115 450 110"/><path class="line" d="M370 225 C410 260 420 305 450 310"/><path class="line" d="M600 110 L680 110"/><path class="line" d="M600 310 L680 310"/><path class="line" d="M810 310 C850 285 870 245 875 220"/><path class="line" d="M810 110 C850 135 870 175 875 200"/>
</svg>
*** Add File: public/linux/systemd-unit-flow.svg
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="450" viewBox="0 0 1080 450" role="img" aria-labelledby="title desc">
  <title id="title">systemd unit 启动链路</title>
  <desc id="desc">展示 target、unit、依赖、进程、日志和重启策略之间的关系</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
    <style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}.core{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.log{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:10}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:19px;font-weight:700}.body{font-size:13px}.small{font-size:12px;fill:#475569}.line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1080" height="450"/>
  <rect class="core" x="60" y="170" width="155" height="90"/><text class="text title" x="138" y="205" text-anchor="middle">target</text><text class="text body" x="138" y="232" text-anchor="middle">启动目标</text>
  <rect class="core" x="285" y="170" width="155" height="90"/><text class="text title" x="363" y="205" text-anchor="middle">unit</text><text class="text body" x="363" y="232" text-anchor="middle">service/socket/timer</text>
  <rect class="box" x="510" y="70" width="155" height="90"/><text class="text title" x="588" y="105" text-anchor="middle">依赖关系</text><text class="text body" x="588" y="132" text-anchor="middle">After / Requires</text>
  <rect class="box" x="510" y="270" width="155" height="90"/><text class="text title" x="588" y="305" text-anchor="middle">服务进程</text><text class="text body" x="588" y="332" text-anchor="middle">ExecStart</text>
  <rect class="log" x="735" y="70" width="155" height="90"/><text class="text title" x="813" y="105" text-anchor="middle">journald</text><text class="text body" x="813" y="132" text-anchor="middle">日志和状态</text>
  <rect class="warn" x="735" y="270" width="155" height="90"/><text class="text title" x="813" y="305" text-anchor="middle">重启策略</text><text class="text body" x="813" y="332" text-anchor="middle">Restart / Limit</text>
  <path class="line" d="M215 215 L285 215"/><path class="line" d="M440 205 C475 160 485 115 510 115"/><path class="line" d="M440 225 C475 270 485 315 510 315"/><path class="line" d="M665 115 L735 115"/><path class="line" d="M665 315 L735 315"/>
</svg>
