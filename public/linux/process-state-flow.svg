<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">Linux 进程状态流转</title>
  <desc id="desc">展示运行、睡眠、不可中断睡眠、停止、僵尸等状态和排查重点</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}.run{fill:#ecfdf5;stroke:#0f766e;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:10}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:10}
      .text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:18px;font-weight:700}.body{font-size:13px}
      .line{stroke:#0f766e;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1080" height="430"/>
  <rect class="box" x="50" y="170" width="130" height="80"/>
  <text class="text title" x="115" y="202" text-anchor="middle">创建</text>
  <text class="text body" x="115" y="228" text-anchor="middle">fork / exec</text>
  <rect class="run" x="240" y="170" width="130" height="80"/>
  <text class="text title" x="305" y="202" text-anchor="middle">R 运行</text>
  <text class="text body" x="305" y="228" text-anchor="middle">占用或等待 CPU</text>
  <rect class="box" x="450" y="70" width="150" height="80"/>
  <text class="text title" x="525" y="102" text-anchor="middle">S 睡眠</text>
  <text class="text body" x="525" y="128" text-anchor="middle">等待事件</text>
  <rect class="warn" x="450" y="270" width="150" height="80"/>
  <text class="text title" x="525" y="302" text-anchor="middle">D 不可中断</text>
  <text class="text body" x="525" y="328" text-anchor="middle">多见 I/O 卡住</text>
  <rect class="box" x="680" y="70" width="130" height="80"/>
  <text class="text title" x="745" y="102" text-anchor="middle">T 停止</text>
  <text class="text body" x="745" y="128" text-anchor="middle">暂停或调试</text>
  <rect class="bad" x="680" y="270" width="130" height="80"/>
  <text class="text title" x="745" y="302" text-anchor="middle">Z 僵尸</text>
  <text class="text body" x="745" y="328" text-anchor="middle">等待父进程回收</text>
  <rect class="box" x="875" y="170" width="130" height="80"/>
  <text class="text title" x="940" y="202" text-anchor="middle">退出</text>
  <text class="text body" x="940" y="228" text-anchor="middle">资源释放</text>
  <path class="line" d="M180 210 L240 210"/>
  <path class="line" d="M370 195 C410 160 420 115 450 110"/>
  <path class="line" d="M370 225 C410 260 420 305 450 310"/>
  <path class="line" d="M600 110 L680 110"/>
  <path class="line" d="M600 310 L680 310"/>
  <path class="line" d="M810 310 C850 285 870 245 875 220"/>
  <path class="line" d="M810 110 C850 135 870 175 875 200"/>
</svg>
