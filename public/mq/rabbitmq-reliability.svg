<svg xmlns="http://www.w3.org/2000/svg" width="940" height="360" viewBox="0 0 940 360" role="img" aria-labelledby="title desc">
<title id="title">RabbitMQ 可靠性确认链路</title>
<desc id="desc">RabbitMQ 可靠性确认链路</desc>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/></marker><style>.bg{fill:#f8fafc}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2}.main{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.store{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.group{fill:#fff;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:6 4}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:18px;font-weight:700}.body{font-size:13px;fill:#475569}.small{font-size:12px;fill:#64748b}.line{stroke:#2563eb;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:5 5}</style></defs>
<rect class="bg" width="940" height="360"/>
<text class="text title" x="470" y="38" text-anchor="middle">RabbitMQ 可靠性确认链路</text>
<rect class="node" x="90" y="150" width="160" height="70" rx="10"/><text class="text body" x="170" y="190" text-anchor="middle">Producer</text>
<rect class="main" x="390" y="150" width="160" height="70" rx="10"/><text class="text body" x="470" y="190" text-anchor="middle">Broker</text>
<rect class="node" x="690" y="150" width="160" height="70" rx="10"/><text class="text body" x="770" y="190" text-anchor="middle">Consumer</text>
<path class="line" d="M250 172 L390 172"/><text class="text small" x="320" y="160" text-anchor="middle">publish</text>
<path class="line" d="M390 205 L250 205"/><text class="text small" x="320" y="230" text-anchor="middle">publisher confirm</text>
<path class="line" d="M550 172 L690 172"/><text class="text small" x="620" y="160" text-anchor="middle">deliver</text>
<path class="line" d="M690 205 L550 205"/><text class="text small" x="620" y="230" text-anchor="middle">ack/nack</text>
