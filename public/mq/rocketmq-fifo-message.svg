<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
<title id="title">RocketMQ 顺序消息</title>
<desc id="desc">RocketMQ 顺序消息</desc>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/></marker><style>.bg{fill:#f8fafc}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:10}.main{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.store{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}.group{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:6 4;rx:12}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:18px;font-weight:700}.body{font-size:13px;fill:#475569}.small{font-size:12px;fill:#64748b}.line{stroke:#2563eb;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:5 5}.msg{stroke:#2563eb;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
<rect class="bg" width="980" height="420"/>
<text class="text title" x="490" y="38" text-anchor="middle">RocketMQ 顺序消息</text>
<rect class="node" x="60" y="80" width="150" height="64"/><text class="text body" x="135" y="112" text-anchor="middle">orderId=100 创建</text>
<rect class="node" x="60" y="180" width="150" height="64"/><text class="text body" x="135" y="212" text-anchor="middle">orderId=100 支付</text>
<rect class="node" x="60" y="280" width="150" height="64"/><text class="text body" x="135" y="312" text-anchor="middle">orderId=100 发货</text>
<rect class="main" x="360" y="180" width="190" height="64"/><text class="text body" x="455" y="203" text-anchor="middle">按 orderId 选择 Q</text><text class="text body" x="455" y="223" text-anchor="middle">ueue</text>
<rect class="store" x="620" y="180" width="150" height="64"/><text class="text body" x="695" y="212" text-anchor="middle">同一个 Queue</text>
<rect class="node" x="800" y="180" width="150" height="64"/><text class="text body" x="875" y="212" text-anchor="middle">顺序消费者</text>
<path class="line" d="M210 112 L285 112 L285 212 L360 212"/>
<path class="line" d="M210 212 L360 212"/>
<path class="line" d="M210 312 L285 312 L285 212 L360 212"/>
<path class="line" d="M550 212 L620 212"/>
<path class="line" d="M770 212 L800 212"/>
</svg>
