<rect class="warn" x="190" y="370" width="220" height="70" rx="10"/><text class="text body" x="300" y="401" text-anchor="middle">事务/顺序/延时</text><text class="text body" x="300" y="421" text-anchor="middle">强语义?</text>
<rect class="store" x="70" y="485" width="160" height="64" rx="10"/><text class="text body" x="150" y="522" text-anchor="middle">RabbitMQ</text>
<rect class="store" x="350" y="485" width="160" height="64" rx="10"/><text class="text body" x="430" y="522" text-anchor="middle">RocketMQ</text>
<rect class="warn" x="720" y="260" width="210" height="70" rx="10"/><text class="text body" x="825" y="300" text-anchor="middle">高吞吐事件流/日志?</text>
<rect class="warn" x="720" y="370" width="220" height="70" rx="10"/><text class="text body" x="830" y="401" text-anchor="middle">多租户/跨地域</text><text class="text body" x="830" y="421" text-anchor="middle">存算分离?</text>
<rect class="store" x="630" y="485" width="160" height="64" rx="10"/><text class="text body" x="710" y="522" text-anchor="middle">Kafka</text>
<rect class="store" x="900" y="485" width="160" height="64" rx="10"/><text class="text body" x="980" y="522" text-anchor="middle">Pulsar</text>
<path class="line" d="M560 134 L560 155"/>
