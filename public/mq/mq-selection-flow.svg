<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
<title id="title">消息中间件选型流程</title>
<desc id="desc">消息中间件选型流程</desc>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/></marker><style>.bg{fill:#f8fafc}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2}.main{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.store{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.group{fill:#fff;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:6 4}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:18px;font-weight:700}.body{font-size:13px;fill:#475569}.small{font-size:12px;fill:#64748b}.line{stroke:#2563eb;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:5 5}</style></defs>
<rect class="bg" width="1120" height="600"/>
<text class="text title" x="560" y="38" text-anchor="middle">消息中间件选型流程</text>
<rect class="main" x="480" y="70" width="160" height="64" rx="10"/><text class="text body" x="560" y="107" text-anchor="middle">需要消息中间件</text>
<rect class="warn" x="470" y="155" width="180" height="70" rx="10"/><text class="text body" x="560" y="195" text-anchor="middle">业务异步任务为主?</text>
