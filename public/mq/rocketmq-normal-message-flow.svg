<rect class="main" x="530" y="70" width="120" height="44"/><text class="text body" x="590" y="98" text-anchor="middle">Consumer</text>
<path class="dash" d="M590 114 L590 337"/>
<path class="msg" d="M80 145 L250 145"/><text class="text small" x="165" y="137" text-anchor="middle">获取 Topic 路由</text>
