<rect class="main" x="420" y="80" width="170" height="70" rx="10"/><text class="text body" x="505" y="120" text-anchor="middle">NameServer</text>
<rect class="store" x="720" y="150" width="180" height="70" rx="10"/><text class="text body" x="810" y="190" text-anchor="middle">Broker Master</text>
