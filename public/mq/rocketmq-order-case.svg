<rect class="store" x="790" y="100" width="150" height="64"/><text class="text body" x="865" y="132" text-anchor="middle">订单库</text>
<rect class="node" x="60" y="270" width="150" height="64"/><text class="text body" x="135" y="302" text-anchor="middle">支付服务</text>
