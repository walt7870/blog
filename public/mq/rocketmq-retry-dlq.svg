<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" role="img" aria-labelledby="title desc">
<title id="title">RocketMQ 消费重试与死信</title>
<desc id="desc">RocketMQ 消费重试与死信</desc>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/></marker><style>.bg{fill:#f8fafc}.node{fill:#fff;stroke:#cbd5e1;stroke-width:2}.main{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.store{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.group{fill:#fff;stroke:#cbd5e1;stroke-width:2;stroke-dasharray:6 4}.text{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.title{font-size:18px;font-weight:700}.body{font-size:13px;fill:#475569}.small{font-size:12px;fill:#64748b}.line{stroke:#2563eb;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:5 5}</style></defs>
<rect class="bg" width="940" height="430"/>
<text class="text title" x="470" y="38" text-anchor="middle">RocketMQ 消费重试与死信</text>
<rect class="main" x="90" y="170" width="180" height="70" rx="10"/><text class="text body" x="180" y="210" text-anchor="middle">Broker 投递消息</text>
<rect class="node" x="380" y="170" width="160" height="70" rx="10"/><text class="text body" x="460" y="210" text-anchor="middle">Consumer</text>
<rect class="store" x="660" y="85" width="160" height="70" rx="10"/><text class="text body" x="740" y="125" text-anchor="middle">确认消费</text>
<rect class="warn" x="660" y="210" width="160" height="70" rx="10"/><text class="text body" x="740" y="250" text-anchor="middle">按策略重试</text>
<rect class="store" x="660" y="325" width="160" height="70" rx="10"/><text class="text body" x="740" y="365" text-anchor="middle">死信队列</text>
<path class="line" d="M270 205 L380 205"/>
<path class="line" d="M540 190 L660 120"/><text class="text small" x="600" y="145" text-anchor="middle">成功</text>
<path class="line" d="M540 215 L660 245"/><text class="text small" x="600" y="238" text-anchor="middle">失败</text>
<path class="line" d="M660 245 L585 245 L585 205 L540 205"/><text class="text small" x="585" y="267" text-anchor="middle">继续重试</text>
<path class="line" d="M740 280 L740 325"/><text class="text small" x="800" y="305" text-anchor="middle">超过最大次数</text>
</svg>
